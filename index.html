// Base 100 = primeiro trimestre (10Q1) para todos os ativos.
// CDI/IPCA são compostos trimestre a trimestre a partir da taxa anual.
// Boi extrapolado retroativamente até 10Q1 (NESPRO/UFRGS começou 2015; antes via Esalq/B3 Boi Gordo SP -spread RS)
const HISTORICO_MULTI = (() => {
  let cdiAcc = 100, ipcaAcc = 100, selicAcc = 100;
  let margemAcumulada = 0;
  let receitaAcumulada = 0;
  let yieldIndex = 100;  // ★ Índice acumulado de yield: começa em 100, soma yield trimestral
  const base = {
    soja:      HISTORICO_CALC[0].sacaCIF,
    milho:     HISTORICO_MILHO[0].milhoSP - 8,
    boi:       HISTORICO_GADO[0].boiVivo,
    dolar:     HISTORICO_CALC[0].dolar,
    ouroBRL:   MACRO_ANUAL[2010].ouro * HISTORICO_CALC[0].dolar,
    prataBRL:  MACRO_ANUAL[2010].prata * HISTORICO_CALC[0].dolar,
    cobreBRL:  MACRO_ANUAL[2010].cobre * HISTORICO_CALC[0].dolar,
    minerioBRL:MACRO_ANUAL[2010].minerioFe * HISTORICO_CALC[0].dolar,
    diesel:    MACRO_ANUAL[2010].diesel,
    hilux:     MACRO_ANUAL[2010].hilux,
    feijao:    AGRICOLAS_BR[2010].feijao,
    mandioca:  AGRICOLAS_BR[2010].mandioca,
    cebola:    AGRICOLAS_BR[2010].cebola,
    leite:     AGRICOLAS_BR[2010].leite,
  };

  return HISTORICO_CALC.map((s, idx) => {
    const ano = parseInt('20' + s.t.substring(0, 2));
    const macro = MACRO_ANUAL[ano] || MACRO_ANUAL[2026];
    const agro = AGRICOLAS_BR[ano] || AGRICOLAS_BR[2026];
    const m = HISTORICO_MILHO.find(x => x.t === s.t);
    const g = HISTORICO_GADO.find(x => x.t === s.t);

    const qFactor_cdi = Math.pow(1 + macro.cdi, 0.25);
    const qFactor_ipca = Math.pow(1 + macro.ipca, 0.25);
    const qFactor_selic = Math.pow(1 + macro.selic, 0.25);
    if (idx > 0) {
      cdiAcc *= qFactor_cdi;
      ipcaAcc *= qFactor_ipca;
      selicAcc *= qFactor_selic;
    }

    const ouroBRL = macro.ouro * s.dolar;
    const prataBRL = macro.prata * s.dolar;
    const cobreBRL = macro.cobre * s.dolar;
    const minerioBRL = macro.minerioFe * s.dolar;

    const custoSojaQ = macro.custo;
    // Decomposição para RS Planalto (consultor + realidade local JC/RS):
    // Custo variável ~55% (insumos, defensivos, frete, mão-de-obra eventual)
    // Custo fixo ~45% (sendo terra/arrendamento ~35-40% do total — maior item isolado)
    // Em R$ 92/sc total: variável R$ 51 · fixo R$ 41 · dos quais arrendamento ~R$ 33-37
    const custoVarQ = custoSojaQ * 0.55;
    const custoFixoQ = custoSojaQ * 0.45;
    const margemBrutaQ = s.sacaCIF - custoVarQ;       // bruta = preço − custo variável
    const margemLiquidaQ = s.sacaCIF - custoSojaQ;    // líquida = preço − custo total
    margemAcumulada += margemLiquidaQ;
    receitaAcumulada += s.sacaCIF;
    // Yield trimestral em % = margem do trimestre / preço do trimestre × 100
    const yieldQ = s.sacaCIF > 0 ? (margemLiquidaQ / s.sacaCIF) * 100 : 0;
    yieldIndex += yieldQ;  // soma o yield do trimestre ao índice (começa em 100, acumula)

    return {
      t: s.t,
      // Valores absolutos (úteis em tooltips)
      soja: Math.round(s.sacaCIF * 100) / 100,
      milho: m ? Math.round((m.milhoSP - 8) * 100) / 100 : null,
      boi: g ? g.boiVivo : null,
      dolarVal: s.dolar,
      ouroBRL: Math.round(ouroBRL),
      prataBRL: Math.round(prataBRL * 100) / 100,
      cobreBRL: Math.round(cobreBRL),
      minerioBRL: Math.round(minerioBRL),
      diesel: macro.diesel,
      hilux: macro.hilux,
      feijao: agro.feijao,
      mandioca: agro.mandioca,
      cebola: agro.cebola,
      leite: agro.leite,
      // Normalizado base 100 em 10Q1
      sojaNorm: Math.round((s.sacaCIF / base.soja) * 100),
      milhoNorm: m ? Math.round(((m.milhoSP - 8) / base.milho) * 100) : null,
      boiNorm: g ? Math.round((g.boiVivo / base.boi) * 100) : null,
      dolarNorm: Math.round((s.dolar / base.dolar) * 100),
      ouroNorm: Math.round((ouroBRL / base.ouroBRL) * 100),
      prataNorm: Math.round((prataBRL / base.prataBRL) * 100),
      cobreNorm: Math.round((cobreBRL / base.cobreBRL) * 100),
      minerioNorm: Math.round((minerioBRL / base.minerioBRL) * 100),
      dieselNorm: Math.round((macro.diesel / base.diesel) * 100),
      hiluxNorm: Math.round((macro.hilux / base.hilux) * 100),
      // Custos normalizados base 100 (para aba Custos)
      custoTotalNorm: Math.round((macro.custo / MACRO_ANUAL[2010].custo) * 100),
      custoVarNorm: Math.round(((macro.custo * 0.55) / (MACRO_ANUAL[2010].custo * 0.55)) * 100),
      custoFixoNorm: Math.round(((macro.custo * 0.45) / (MACRO_ANUAL[2010].custo * 0.45)) * 100),
      feijaoNorm: Math.round((agro.feijao / base.feijao) * 100),
      mandiocaNorm: Math.round((agro.mandioca / base.mandioca) * 100),
      cebolaNorm: Math.round((agro.cebola / base.cebola) * 100),
      leiteNorm: Math.round((agro.leite / base.leite) * 100),
      cdiAcc: Math.round(cdiAcc),
      ipcaAcc: Math.round(ipcaAcc),
      selicAcc: Math.round(selicAcc),
      // Margem soja
      custoSoja: custoSojaQ,
      custoVar: Math.round(custoVarQ * 100) / 100,
      custoFixo: Math.round(custoFixoQ * 100) / 100,
      margem: Math.round(margemLiquidaQ * 100) / 100,     // legado (= margem líquida)
      margemBruta: Math.round(margemBrutaQ * 100) / 100,
      margemLiquida: Math.round(margemLiquidaQ * 100) / 100,
      // Margens em % sobre receita (preço)
      margemBrutaPct: s.sacaCIF > 0 ? Math.round((margemBrutaQ / s.sacaCIF) * 1000) / 10 : 0,
      margemLiquidaPct: s.sacaCIF > 0 ? Math.round((margemLiquidaQ / s.sacaCIF) * 1000) / 10 : 0,
      margemAcc: Math.round(margemAcumulada * 100) / 100,
      // ★ Margem líquida ACUMULADA em % = soma margens ÷ soma preços × 100
      // (yield médio histórico até este trimestre — comparável visualmente com base 100)
      margemAccPct: receitaAcumulada > 0 ? Math.round((margemAcumulada / receitaAcumulada) * 1000) / 10 : 0,
      // ★ Índice de yield acumulado: começa em 100 e soma o yield % de cada trimestre
      margemYieldIdx: Math.round(yieldIndex * 10) / 10,
    };
  });
})();

const MARGEM_MEDIA_HIST = HISTORICO_MULTI.reduce((s, d) => s + d.margem, 0) / HISTORICO_MULTI.length;
const MARGEM_MEDIA_PCT_HIST = HISTORICO_MULTI.reduce((s, d) => s + d.margemLiquidaPct, 0) / HISTORICO_MULTI.length;

// Normaliza margem acumulada para base 100 em 10Q1 (para comparação no gráfico geral)
(() => {
  const baseAcc = HISTORICO_MULTI[0].margemAcc;

    d.margemAccNorm = Math.round((d.margemAcc / baseAcc) * 100);
  });
})();

// Agregação anual da margem soja (bruta + líquida + acumulada por ano)
const MARGEM_ANUAL = (() => {
  const map = new Map();
  HISTORICO_MULTI.forEach(d => {
    const ano = 2000 + parseInt(d.t.substring(0, 2));
    if (!map.has(ano)) {
      map.set(ano, {
        ano, precos: [], cVar: d.custoVar, cFixo: d.custoFixo, cTotal: d.custoSoja,
        margemBrutaSum: 0, margemLiquidaSum: 0,
      });
    }
    const e = map.get(ano);
    e.precos.push(d.soja);
    e.margemBrutaSum += d.margemBruta;
    e.margemLiquidaSum += d.margemLiquida;
  });
  return [...map.values()].map(e => {
    const precoMedio = e.precos.reduce((a, b) => a + b, 0) / e.precos.length;
    return {
      ano: e.ano,
      precoMedio: Math.round(precoMedio * 100) / 100,
      custoTotal: e.cTotal,
      custoVar: Math.round(e.cVar * 100) / 100,
      custoFixo: Math.round(e.cFixo * 100) / 100,
      margemBruta: Math.round((precoMedio - e.cVar) * 100) / 100,
      margemLiquida: Math.round((precoMedio - e.cTotal) * 100) / 100,
      margemBrutaPct: precoMedio > 0 ? Math.round(((precoMedio - e.cVar) / precoMedio) * 1000) / 10 : 0,
      margemLiquidaPct: precoMedio > 0 ? Math.round(((precoMedio - e.cTotal) / precoMedio) * 1000) / 10 : 0,
      margemBrutaHa: Math.round((precoMedio - e.cVar) * 55),
      margemLiquidaHa: Math.round((precoMedio - e.cTotal) * 55),
    };
  });
})();

// === RENTABILIDADE REAL JC/RS · produtividade IBGE × margem CEPEA ===
// === RENTABILIDADE REAL JC/RS · CUSTO FIXO POR HECTARE ===
// CORREÇÃO IMPORTANTE: o custo Conab em R$/sc assume produtividade ~50 sc/ha (RS Planalto)
// Quando produtividade cai (quebra), o custo R$/sc REAL dispara porque o R$/ha é quase fixo
// Modelagem: ~80% do custo R$/ha é fixo (terra, depreciação, juros, parte dos insumos)
// ~20% escala com produtividade (frete colheita, secagem, parte variável insumos)
const PROD_BASE_CONAB = 50;  // produtividade base que Conab assume para RS Planalto
let _rentAcumulada = 0;
const RENTABILIDADE_REAL_JC = MARGEM_ANUAL.map(m => {
  const p = PRODUTIVIDADE_JC[m.ano] || { kgHa:0, scHa:0, status:'?', obs:'sem dado' };
  const custoTotalHa = m.custoTotal * PROD_BASE_CONAB;
  const custoFixoHa = custoTotalHa * 0.80;
  const custoVarHaBase = custoTotalHa * 0.20;
  const custoVarHaReal = p.scHa > 0 ? custoVarHaBase * (p.scHa / PROD_BASE_CONAB) : 0;
  const custoTotalHaReal = custoFixoHa + custoVarHaReal;
  const custoRealSaca = p.scHa > 0 ? custoTotalHaReal / p.scHa : 0;
  const receitaHa = m.precoMedio * p.scHa;
  const rentReal = Math.round(receitaHa - custoTotalHaReal);
  const margemRealSaca = m.precoMedio - custoRealSaca;
  _rentAcumulada += rentReal;
  return {
    ano: m.ano,
    prodScHa: p.scHa,
    prodKgHa: p.kgHa,
    status: p.status,
    obs: p.obs,
    precoMedio: m.precoMedio,
    custoTotal: m.custoTotal,
    custoRealSaca: Math.round(custoRealSaca * 100) / 100,
    custoTotalHaReal: Math.round(custoTotalHaReal),
    margemLiquidaSaca: m.margemLiquida,
    margemRealSaca: Math.round(margemRealSaca * 100) / 100,
    margemLiquidaPct: m.margemLiquidaPct,
    margemRealPct: m.precoMedio > 0 ? Math.round((margemRealSaca / m.precoMedio) * 1000) / 10 : 0,
    receitaHa: Math.round(receitaHa),
    rentabilidadeHa: rentReal,
    rentabilidadePadrao50: Math.round(m.margemLiquida * PROD_BASE_CONAB),
    delta: Math.round(rentReal - (m.margemLiquida * PROD_BASE_CONAB)),
    // ★ Rentabilidade acumulada (somatório R$/ha desde 2010)
    rentabilidadeAcumulada: _rentAcumulada,
  };
});
const RENT_JC_RESUMO = {
  prodMedia: Math.round(RENTABILIDADE_REAL_JC.reduce((s, r) => s + r.prodScHa, 0) / RENTABILIDADE_REAL_JC.length * 10) / 10,
  rentMedia: Math.round(RENTABILIDADE_REAL_JC.reduce((s, r) => s + r.rentabilidadeHa, 0) / RENTABILIDADE_REAL_JC.length),
  rentTotal: RENTABILIDADE_REAL_JC.reduce((s, r) => s + r.rentabilidadeHa, 0),
  anosQuebra: RENTABILIDADE_REAL_JC.filter(r => r.status.startsWith('quebra')).length,
  anosBoa: RENTABILIDADE_REAL_JC.filter(r => r.status === 'boa').length,
  piorAno: RENTABILIDADE_REAL_JC.reduce((min, r) => r.prodScHa < min.prodScHa ? r : min, RENTABILIDADE_REAL_JC[0]),
  melhorAno: RENTABILIDADE_REAL_JC.reduce((max, r) => r.prodScHa > max.prodScHa ? r : max, RENTABILIDADE_REAL_JC[0]),

const classificar = (valor, faixa) => {
  if (valor < faixa.baixo) return 'baixo';
  if (valor > faixa.alto) return 'alto';

};

// === Motor de estratégia (por componente, nível × expectativa) ===

// === Calculadora por estratégia clássica ===
// Cada estratégia recebe { sacaCIF, custoSaca, prodSoja, areaTotal } como contexto
// e mostra inputs próprios + output calculado.
function EstratCalc({ idx, ctx }) {
  const [a, setA] = useState(0);
  const [b, setB] = useState(0);
  const [c, setC] = useState(0);
  const [d, setD] = useState(0);
  const [e, setE] = useState(0);

  const labelRow = (label, value, cor) => (
    <div style={{display: 'flex', justifyContent: 'space-between', padding: '4px 0', fontSize: 12, fontFamily: "'IBM Plex Mono', monospace"}}>
      <span style={{color: '#A89968'}}>{label}</span>
      <span style={{color: cor || '#E8E2D0', fontWeight: 600}}>{value}</span>
    </div>
  );

  const ctxBlock = (
    <div style={{padding: 10, background: '#181C18', marginBottom: 10, fontSize: 11, fontFamily: "'IBM Plex Mono', monospace", color: '#A89968'}}>
      contexto: saca CIF R$ {ctx.sacaCIF.toFixed(2)} · custo R$ {ctx.custoSaca}/sc · produtividade {ctx.prodSoja} sc/ha · área {ctx.areaTotal} ha
    </div>
  );

  // Estratégia 1: Venda escalonada
  if (idx === 0) {
    const camadas = parseInt(a) || 4;
    const inicial = parseFloat(b) || ctx.sacaCIF;
    const passo = parseFloat(c) || 5;
    const precos = Array.from({length: camadas}, (_, i) => inicial + i * passo);
    const media = precos.reduce((s, v) => s + v, 0) / camadas;
    const margem = media - ctx.custoSaca;
    return (
      <div>
        {ctxBlock}
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8}}>
          <div style={S.inputBlock}><label style={S.inputLabel}>Nº camadas</label><input type="number" value={a} placeholder="4" onChange={e => setA(e.target.value)} /></div>
          <div style={S.inputBlock}><label style={S.inputLabel}>Preço inicial R$</label><input type="number" step="1" value={b} placeholder={ctx.sacaCIF.toFixed(0)} onChange={e => setB(e.target.value)} /></div>
          <div style={S.inputBlock}><label style={S.inputLabel}>Incremento R$/camada</label><input type="number" step="1" value={c} placeholder="5" onChange={e => setC(e.target.value)} /></div>
        </div>
        <div style={{background: '#0F1410', padding: 10, marginTop: 8}}>
          {labelRow('Preços travados', precos.map(p => 'R$' + p.toFixed(0)).join(' → '))}
          {labelRow('Preço médio', `R$ ${media.toFixed(2)}/saca`, '#C8E04A')}
          {labelRow('Margem média', `R$ ${margem.toFixed(2)}/saca`, margem > 0 ? '#C8E04A' : '#D9542B')}
          {labelRow(`Fazenda (${ctx.areaTotal} ha)`, `R$ ${(margem * ctx.prodSoja * ctx.areaTotal / 1000).toFixed(0)}k`)}
        </div>
      </div>
    );
  }

  // Estratégia 2: Contrato a fixar (sem cálculo profundo)
  if (idx === 1) {
    const preco = parseFloat(a) || ctx.sacaCIF;
    const prazo = parseInt(b) || 6;
    return (
      <div>
        {ctxBlock}
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8}}>
          <div style={S.inputBlock}><label style={S.inputLabel}>Preço atual a fixar</label><input type="number" step="1" value={a} placeholder={ctx.sacaCIF.toFixed(0)} onChange={e => setA(e.target.value)} /></div>
          <div style={S.inputBlock}><label style={S.inputLabel}>Prazo de fixação (meses)</label><input type="number" value={b} placeholder="6" onChange={e => setB(e.target.value)} /></div>
        </div>
        <div style={{background: '#0F1410', padding: 10, marginTop: 8}}>
          {labelRow('Margem se fixar hoje', `R$ ${(preco - ctx.custoSaca).toFixed(2)}/saca`, (preco - ctx.custoSaca) > 0 ? '#C8E04A' : '#D9542B')}
          {labelRow('Janela para decidir', `${prazo} meses`)}
          {labelRow('Risco principal', 'Se mercado cair, fixa pior; sem volta', '#E6B84A')}
        </div>
      </div>
    );
  }

  // Estratégia 3: Barter (troca-troca)
  if (idx === 2) {
    const custoInsumoHa = parseFloat(a) || 2400;
    const mesesAntecip = parseFloat(b) || 6;  // meses entre receber adubo e entregar soja
    const precoForwardSoja = parseFloat(c) || ctx.sacaCIF;  // preço travado para entrega
    const sacasInsumo = precoForwardSoja > 0 ? custoInsumoHa / precoForwardSoja : 0;
    const pctReceita = (sacasInsumo / ctx.prodSoja) * 100;
    // Custo financeiro evitado: se comprasse no spot com CDI atual
    const cdiAnual = 0.135;  // CDI atual ~13,5%
    const cdiMensal = Math.pow(1 + cdiAnual, 1/12) - 1;
    const custoFinanceiroEvit = custoInsumoHa * (Math.pow(1 + cdiMensal, mesesAntecip) - 1);
    return (
      <div>
        {ctxBlock}
        <div style={{padding: 10, background: '#181C18', fontSize: 11, color: '#A89968', marginBottom: 10, lineHeight: 1.5}}>
          <strong style={{color: '#E8E2D0'}}>Barter = troca direta:</strong> você recebe adubo HOJE e paga em sacas FUTURAS (entrega na colheita). Trava margem operacional (custo NPK fica fixo em sacas) e evita financiar com CDI alto. Cooperativas (Cotrijuc, Cotrijal) e tradings (Bunge, Cargill, ADM) oferecem essa estrutura.
        </div>
        <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8}}>
          <div style={S.inputBlock}><label style={S.inputLabel}>Custo NPK total R$/ha</label><input type="number" step="100" value={a} placeholder="2400" onChange={e => setA(e.target.value)} /></div>
          <div style={S.inputBlock}><label style={S.inputLabel}>Meses até entrega (4-8 típico)</label><input type="number" step="1" min="1" max="12" value={b} placeholder="6" onChange={e => setB(e.target.value)} /></div>
        </div>
        <div style={S.inputBlock}><label style={S.inputLabel}>Preço soja travado R$/sc (para entrega)</label><input type="number" step="1" value={c} placeholder={ctx.sacaCIF.toFixed(0)} onChange={e => setC(e.target.value)} /></div>
        <div style={{background: '#0F1410', padding: 10, marginTop: 8, borderLeft: '3px solid #C8E04A'}}>
          {labelRow('Sacas pagas em NPK', `${sacasInsumo.toFixed(1)} sc/ha`)}
          {labelRow('% da safra pagando NPK', `${pctReceita.toFixed(1)}%`, pctReceita > 30 ? '#D9542B' : pctReceita > 20 ? '#E6B84A' : '#C8E04A')}
          {labelRow('Sacas líquidas /ha (após NPK)', `${(ctx.prodSoja - sacasInsumo).toFixed(1)} sc/ha`, '#C8E04A')}
          {labelRow('Fazenda total a vender pós-NPK', `${((ctx.prodSoja - sacasInsumo) * ctx.areaTotal).toFixed(0)} sc`)}
        </div>
        <div style={{background: '#0F1410', padding: 10, marginTop: 8, borderLeft: '3px solid #E6B84A'}}>
          <div style={{fontSize: 10, color: '#A89968', letterSpacing: 1, marginBottom: 4}}>★ ECONOMIA FINANCEIRA EVITADA</div>
          {labelRow(`Juros CDI ${(cdiAnual*100).toFixed(1)}% por ${mesesAntecip}m`, `R$ ${custoFinanceiroEvit.toFixed(0)}/ha`, '#C8E04A')}
          {labelRow('Sacas equivalentes a juros evitados', `${(custoFinanceiroEvit/precoForwardSoja).toFixed(1)} sc/ha`, '#C8E04A')}
          {labelRow('Receita TOTAL fazenda (juros incl.)', `R$ ${(custoFinanceiroEvit * ctx.areaTotal).toFixed(0)}`, '#C8E04A')}
        </div>
        <div style={{marginTop: 8, padding: 10, background: '#0F1410', fontSize: 11, color: '#A89968', lineHeight: 1.5, borderLeft: '2px solid #A89968'}}>
          <strong>Quando vale:</strong> CDI alto (acima 12%) + relação de troca favorável (módulo 02) + clima previsível. <strong>Quando NÃO vale:</strong> risco de quebra de safra (você assume entrega física obrigatória); preço soja muito desvalorizado durante o ano (você se arrepende de não ter travado mais sacas).
        </div>
      </div>
    );
  }

  // Estratégia 4: Forward (venda antecipada)
  if (idx === 3) {
    const precoForward = parseFloat(a) || ctx.sacaCIF;
    const pctVenda = parseFloat(b) || 40;
    const margemSc = precoForward - ctx.custoSaca;
    const sacasPreVendidas = ctx.prodSoja * ctx.areaTotal * (pctVenda / 100);
    const margemTotal = margemSc * sacasPreVendidas;
    const quebraRisco = pctVenda > 50 ? 'ALTO' : pctVenda > 30 ? 'MÉDIO' : 'BAIXO';
    return (
      <div>
        {ctxBlock}
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8}}>
          <div style={S.inputBlock}><label style={S.inputLabel}>Preço forward R$/saca</label><input type="number" step="1" value={a} placeholder={ctx.sacaCIF.toFixed(0)} onChange={e => setA(e.target.value)} /></div>
          <div style={S.inputBlock}><label style={S.inputLabel}>% da safra a pré-vender</label><input type="number" min="0" max="100" value={b} placeholder="40" onChange={e => setB(e.target.value)} /></div>
        </div>
        <div style={{background: '#0F1410', padding: 10, marginTop: 8}}>
          {labelRow('Margem por saca travada', `R$ ${margemSc.toFixed(2)}`, margemSc > 0 ? '#C8E04A' : '#D9542B')}
          {labelRow('Sacas pré-vendidas', `${sacasPreVendidas.toFixed(0)} sc`)}
          {labelRow('Margem total travada', `R$ ${(margemTotal/1000).toFixed(0)}k`, margemTotal > 0 ? '#C8E04A' : '#D9542B')}
          {labelRow('Risco de quebra (JC/RS)', quebraRisco, quebraRisco === 'ALTO' ? '#D9542B' : quebraRisco === 'MÉDIO' ? '#E6B84A' : '#C8E04A')}
        </div>
      </div>
    );
  }

  // Estratégia 5: Put protetiva
  if (idx === 4) {
    const strikeUSDBu = parseFloat(a) || 11.5;
    const premioUSDBu = parseFloat(b) || 0.40;
    const dolarUsd = parseFloat(c) || 5.10;
    const BU = 2.2046;
    const strikeBRL = strikeUSDBu * BU * dolarUsd;
    const premioBRL = premioUSDBu * BU * dolarUsd;
    const precoLiqExercicio = strikeBRL - premioBRL;
    const breakeven = strikeUSDBu - premioUSDBu;
    return (
      <div>
        {ctxBlock}
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8}}>
          <div style={S.inputBlock}><label style={S.inputLabel}>Strike USD/bu</label><input type="number" step="0.05" value={a} placeholder="11,50" onChange={e => setA(e.target.value)} /></div>
          <div style={S.inputBlock}><label style={S.inputLabel}>Prêmio pago USD/bu</label><input type="number" step="0.05" value={b} placeholder="0,40" onChange={e => setB(e.target.value)} /></div>
          <div style={S.inputBlock}><label style={S.inputLabel}>Dólar R$</label><input type="number" step="0.01" value={c} placeholder="5,10" onChange={e => setC(e.target.value)} /></div>
        </div>
        <div style={{background: '#0F1410', padding: 10, marginTop: 8}}>
          {labelRow('Preço piso (strike em R$)', `R$ ${strikeBRL.toFixed(2)}/saca`)}
          {labelRow('Custo do prêmio', `R$ ${premioBRL.toFixed(2)}/saca`, '#E6B84A')}
          {labelRow('Preço líquido se exercer', `R$ ${precoLiqExercicio.toFixed(2)}/saca`, '#C8E04A')}
          {labelRow('Break-even CBOT', `${breakeven.toFixed(2)} USD/bu`)}
          {labelRow('Margem mínima garantida', `R$ ${(precoLiqExercicio - ctx.custoSaca).toFixed(2)}/saca`, (precoLiqExercicio - ctx.custoSaca) > 0 ? '#C8E04A' : '#D9542B')}
        </div>
      </div>
    );
  }

  // Estratégia 6: Collar / fence
  if (idx === 5) {
    const strikePut = parseFloat(a) || 11.0;
    const strikeCall = parseFloat(b) || 13.5;
    const dolarUsd = parseFloat(c) || 5.10;
    const BU = 2.2046;
    const pisoBRL = strikePut * BU * dolarUsd;
    const tetoBRL = strikeCall * BU * dolarUsd;
    return (
      <div>
        {ctxBlock}
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8}}>
          <div style={S.inputBlock}><label style={S.inputLabel}>Strike put (piso) USD/bu</label><input type="number" step="0.05" value={a} placeholder="11,00" onChange={e => setA(e.target.value)} /></div>
          <div style={S.inputBlock}><label style={S.inputLabel}>Strike call (teto) USD/bu</label><input type="number" step="0.05" value={b} placeholder="13,50" onChange={e => setB(e.target.value)} /></div>
          <div style={S.inputBlock}><label style={S.inputLabel}>Dólar R$</label><input type="number" step="0.01" value={c} placeholder="5,10" onChange={e => setC(e.target.value)} /></div>
        </div>
        <div style={{background: '#0F1410', padding: 10, marginTop: 8}}>
          {labelRow('Piso garantido', `R$ ${pisoBRL.toFixed(2)}/saca`, '#C8E04A')}
          {labelRow('Teto (acima é perdido)', `R$ ${tetoBRL.toFixed(2)}/saca`, '#E6B84A')}
          {labelRow('Margem mínima', `R$ ${(pisoBRL - ctx.custoSaca).toFixed(2)}/saca`)}
          {labelRow('Custo líquido', '~zero (collar de custo zero típico)')}
        </div>
      </div>
    );
  }

  // Estratégia 8: Hedge B3
  if (idx === 7) {
    const numContratos = parseInt(a) || 10;
    const precoTravado = parseFloat(b) || ctx.sacaCIF;
    const sacasPorContrato = 450; // SFI ~27 ton = 450 sc
    const sacasTotais = numContratos * sacasPorContrato;
    const receita = sacasTotais * precoTravado;
    return (
      <div>
        {ctxBlock}
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8}}>
          <div style={S.inputBlock}><label style={S.inputLabel}>Nº contratos SFI</label><input type="number" value={a} placeholder="10" onChange={e => setA(e.target.value)} /></div>
          <div style={S.inputBlock}><label style={S.inputLabel}>Preço travado R$/saca</label><input type="number" step="1" value={b} placeholder={ctx.sacaCIF.toFixed(0)} onChange={e => setB(e.target.value)} /></div>
        </div>
        <div style={{background: '#0F1410', padding: 10, marginTop: 8}}>
          {labelRow('Sacas travadas (450 sc/contrato)', `${sacasTotais} sc`)}
          {labelRow('Receita travada', `R$ ${(receita/1000).toFixed(0)}k`, '#C8E04A')}
          {labelRow('% da safra hedgeada', `${((sacasTotais / (ctx.prodSoja * ctx.areaTotal)) * 100).toFixed(1)}%`)}
          {labelRow('Margem inicial estimada', `~R$ ${(numContratos * 8000).toLocaleString('pt-BR')} (B3)`, '#E6B84A')}
        </div>
      </div>
    );
  }

  // Estratégia 9: Estocagem (carrego com análise financeira)
  if (idx === 8) {
    const custoMes = parseFloat(a) || 1.20;       // R$/sc/mês armazenagem
    const meses = parseInt(b) || 6;
    const altaEsperada = parseFloat(c) || 10;      // % alta esperada no preço
    const cdiAnnD = parseFloat(d);                 // CDI ann custom
    const cdiAnn = !isNaN(cdiAnnD) ? cdiAnnD / 100 : 0.135;  // default 13,5%
    const custoArmazemSc = custoMes * meses;
    // Carrego FINANCEIRO: oportunidade da CDI sobre o capital "preso" na soja
    const cdiMensal = Math.pow(1 + cdiAnn, 1/12) - 1;
    const custoFinanceiroSc = ctx.sacaCIF * (Math.pow(1 + cdiMensal, meses) - 1);
    const custoTotalSc = custoArmazemSc + custoFinanceiroSc;
    const ganhoEsperadoSc = ctx.sacaCIF * (altaEsperada / 100);
    const liquidoSc = ganhoEsperadoSc - custoTotalSc;
    const breakEvenPct = (custoTotalSc / ctx.sacaCIF) * 100;
    return (
      <div>
        {ctxBlock}
        <div style={{padding: 10, background: '#181C18', fontSize: 11, color: '#A89968', marginBottom: 10, lineHeight: 1.5}}>
          <strong style={{color: '#E8E2D0'}}>Estocagem = arbitragem cash-and-carry.</strong> Você guarda a soja na esperança de vender mais caro depois. Custo TOTAL = armazenagem física + <strong>juros sobre capital preso</strong> (CDI). Só vale se a alta esperada superar AMBOS. Compare com a curva de futuros (módulo 05) — se o spread futuro &lt; custo carrego, é arbitragem negativa: melhor vender hoje.
        </div>
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8}}>
          <div style={S.inputBlock}><label style={S.inputLabel}>Custo armazém R$/sc/mês</label><input type="number" step="0.10" value={a} placeholder="1,20" onChange={e => setA(e.target.value)} /></div>
          <div style={S.inputBlock}><label style={S.inputLabel}>Meses de carrego</label><input type="number" value={b} placeholder="6" onChange={e => setB(e.target.value)} /></div>
        </div>
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8}}>
          <div style={S.inputBlock}><label style={S.inputLabel}>% alta esperada no preço</label><input type="number" step="1" value={c} placeholder="10" onChange={e => setC(e.target.value)} /></div>
          <div style={S.inputBlock}><label style={S.inputLabel}>CDI anual %</label><input type="number" step="0.5" value={d} placeholder="13,5" onChange={e => setD(e.target.value)} /></div>
        </div>
        <div style={{background: '#0F1410', padding: 10, marginTop: 8, borderLeft: '3px solid #D9542B'}}>
          <div style={{fontSize: 10, color: '#D9542B', letterSpacing: 1, marginBottom: 4}}>★ CUSTOS DO CARREGO (sai do bolso ou da oportunidade)</div>
          {labelRow('Armazenagem física', `R$ ${custoArmazemSc.toFixed(2)}/sc`, '#D9542B')}
          {labelRow(`Juros CDI ${(cdiAnn*100).toFixed(1)}% por ${meses}m`, `R$ ${custoFinanceiroSc.toFixed(2)}/sc`, '#D9542B')}
          {labelRow('CUSTO TOTAL CARREGO', `R$ ${custoTotalSc.toFixed(2)}/sc`, '#D9542B')}
        </div>
        <div style={{background: '#0F1410', padding: 10, marginTop: 8, borderLeft: '3px solid #C8E04A'}}>
          <div style={{fontSize: 10, color: '#C8E04A', letterSpacing: 1, marginBottom: 4}}>★ GANHO ESPERADO E DIAGNÓSTICO</div>
          {labelRow(`Ganho bruto se subir ${altaEsperada}%`, `R$ ${ganhoEsperadoSc.toFixed(2)}/sc`, '#C8E04A')}
          {labelRow('LÍQUIDO por saca', `R$ ${liquidoSc.toFixed(2)}`, liquidoSc > 0 ? '#C8E04A' : '#D9542B')}
          {labelRow('Break-even % alta mínima', `${breakEvenPct.toFixed(1)}%`, '#E6B84A')}
          {labelRow('TOTAL fazenda', `R$ ${(liquidoSc * ctx.prodSoja * ctx.areaTotal).toFixed(0)}`, liquidoSc > 0 ? '#C8E04A' : '#D9542B')}
        </div>
        <div style={{marginTop: 8, padding: 10, background: '#0F1410', fontSize: 11, color: '#A89968', lineHeight: 1.5, borderLeft: '2px solid #A89968'}}>
          <strong>Insight do consultor:</strong> em ciclo de juros altos (Selic &gt; 13%), o custo financeiro do carrego facilmente supera 8-10% da saca em 6 meses. <strong>Sem alta robusta esperada, vender é matematicamente superior</strong>. Compare com a curva futuros CBOT (módulo 05 aba "Curva soja"): se está em backwardation (futuro &lt; spot), o mercado já fica te dizendo para vender já.
        </div>
      </div>
    );
  }

  // Three-way (idx 6) — collar + put vendida adicional (3 strikes)
  // CBOT em USD/bu × BU_PER_SACA × dolar = R$/saca. Usar dolar ~5,1 e prêmios típicos em ¢/bu.
  if (idx === 6) {
    const dolarRef = 5.10;
    const conv = (usdBu) => usdBu * BU_PER_SACA * dolarRef;  // USD/bu → R$/saca

    const putComprada = parseFloat(a) || 11.00;    // strike A (piso) USD/bu
    const callVendida = parseFloat(b) || 13.50;    // strike B (teto) USD/bu
    const putVendida = parseFloat(c) || 9.50;      // strike C (abaixo daqui assume risco) USD/bu
    const premioPutCompra = parseFloat(d) || 0.40;    // pago em USD/bu
    const premioCallVenda = parseFloat(c) ? 0.35 : 0.35;  // estimativa fixa
    const premioPutVenda = parseFloat(e) || 0.25;     // recebido em USD/bu
    // Saldo líquido de prêmios: paga put A, recebe call B, recebe put C
    const saldoUSDbu = -premioPutCompra + premioCallVenda + premioPutVenda;
    const saldoBRL = conv(saldoUSDbu);

    const pisoGarantidoBRL = conv(putComprada) + saldoBRL;  // se cair entre C e A, recebe A + prêmio líquido
    const tetoBRL = conv(callVendida) + saldoBRL;            // se subir além de B, capa no B + prêmio
    const breakdownBRL = conv(putVendida) + saldoBRL;        // abaixo de C, começa a perder
    const riscoMax = conv(putVendida) - conv(putComprada);   // tamanho da janela vendida na put C

    return (
      <div>
        {ctxBlock}
        <div style={{fontSize: 11, color: '#A89968', marginBottom: 10, padding: 8, background: '#181C18', lineHeight: 1.5}}>
          <strong>Estrutura:</strong> compra PUT em A (piso) + vende CALL em B (teto) + vende PUT em C (mais baixa).
          Funciona como collar mas com prêmio líquido positivo. <strong>Atenção:</strong> abaixo de C você assume RISCO DOBRADO porque ficou vendido em put. Conversão usa dólar de referência R$ {dolarRef.toFixed(2)}.
        </div>
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8}}>
          <div style={S.inputBlock}>
            <label style={S.inputLabel}>Strike PUT comprada (USD/bu)</label>
            <input type="number" step="0.10" value={a} placeholder="11.00" onChange={ev => setA(ev.target.value)} />
          </div>
          <div style={S.inputBlock}>
            <label style={S.inputLabel}>Strike CALL vendida (USD/bu)</label>
            <input type="number" step="0.10" value={b} placeholder="13.50" onChange={ev => setB(ev.target.value)} />
          </div>
          <div style={S.inputBlock}>
            <label style={S.inputLabel}>Strike PUT vendida (USD/bu)</label>
            <input type="number" step="0.10" value={c} placeholder="9.50" onChange={ev => setC(ev.target.value)} />
          </div>
        </div>
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8, marginTop: 6}}>
          <div style={S.inputBlock}>
            <label style={S.inputLabel}>Prêmio PUT compra (USD/bu)</label>
            <input type="number" step="0.05" value={d} placeholder="0.40" onChange={ev => setD(ev.target.value)} />
          </div>
          <div style={S.inputBlock}>
            <label style={S.inputLabel}>Prêmio PUT venda (USD/bu)</label>
            <input type="number" step="0.05" value={e} placeholder="0.25" onChange={ev => setE(ev.target.value)} />
          </div>
        </div>
        <div style={{background: '#0F1410', padding: 10, marginTop: 8}}>
          {labelRow('Prêmio CALL venda (auto)', `${premioCallVenda.toFixed(2)} USD/bu (estimado)`, '#A89968')}
          {labelRow('Saldo líquido de prêmios', `${saldoUSDbu >= 0 ? '+' : ''}${saldoUSDbu.toFixed(2)} USD/bu · R$ ${saldoBRL >= 0 ? '+' : ''}${saldoBRL.toFixed(2)}/sc`, saldoBRL >= 0 ? '#C8E04A' : '#D9542B')}
        </div>
        <div style={{background: '#0F1410', padding: 10, marginTop: 8, borderLeft: '3px solid #C8E04A'}}>
          <div style={{fontSize: 10, color: '#A89968', letterSpacing: 1, marginBottom: 4}}>★ FAIXA PROTEGIDA</div>
          {labelRow('PISO garantido (preço entre C e A)', `R$ ${pisoGarantidoBRL.toFixed(2)}/sc`, '#C8E04A')}
          {labelRow('TETO máximo (preço acima de B)', `R$ ${tetoBRL.toFixed(2)}/sc`, '#E6B84A')}
        </div>
        <div style={{background: '#0F1410', padding: 10, marginTop: 8, borderLeft: '3px solid #D9542B'}}>
          <div style={{fontSize: 10, color: '#D9542B', letterSpacing: 1, marginBottom: 4}}>⚠ ZONA DE RISCO (abaixo do strike C)</div>
          {labelRow('Início do prejuízo (CBOT abaixo de C)', `${putVendida.toFixed(2)} USD/bu = R$ ${breakdownBRL.toFixed(2)}/sc`, '#D9542B')}
          {labelRow('Prejuízo máximo possível (CBOT = 0)', `R$ ${(riscoMax * -1).toFixed(2)}/sc + perda do físico`, '#D9542B')}
        </div>
      </div>
    );
  }

  return null;
}

function TributacaoBloco() {
  // === Inputs comuns ===
  const [receitaBruta, setReceitaBruta] = useState(1500000);  // R$/ano receita bruta venda soja
  const [areaTotalHa, setAreaTotalHa] = useState(200);         // hectares total
  const [areaPlantada, setAreaPlantada] = useState(180);       // hectares plantados
  const [vtnHa, setVtnHa] = useState(8000);                    // Valor Terra Nua R$/ha (RS Planalto)
  const [despesasOp, setDespesasOp] = useState(900000);        // despesas operacionais comprovadas R$/ano

  // === 1. IR Pessoa Física Rural ===
  // Opção A: Simplificada — base = 20% da receita bruta
  // Opção B: Livro caixa — base = receita - despesas comprovadas
  const baseSimplificada = receitaBruta * 0.20;
  const baseLivroCaixa = Math.max(0, receitaBruta - despesasOp);
  // Tabela IRPF 2026 (mensal × 12 para anual)
  const calcIRPF = (base) => {
    // Aliquotas anuais 2026 (aproximadas)
    if (base <= 27840) return 0;
    if (base <= 33919) return (base - 27840) * 0.075;
    if (base <= 45012) return (33919 - 27840) * 0.075 + (base - 33919) * 0.15;
    if (base <= 55976) return (33919 - 27840) * 0.075 + (45012 - 33919) * 0.15 + (base - 45012) * 0.225;
    return (33919 - 27840) * 0.075 + (45012 - 33919) * 0.15 + (55976 - 45012) * 0.225 + (base - 55976) * 0.275;
  };
  const irpfSimplif = calcIRPF(baseSimplificada);
  const irpfLivro = calcIRPF(baseLivroCaixa);
  const irpfMelhor = irpfSimplif < irpfLivro ? 'simplificada' : 'livro';

  // === 2. ITR (Imposto Territorial Rural) ===
  // Cálculo: VTNt × área tributável × alíquota
  // Alíquota varia por área (acima 5000 ha = 20%) e por GU (Grau de Utilização)
  // Para JC/RS pequeno-médio: ~0,07% a 0,3% (terra produtiva GU >80%)
  // Assume GU 100% para soja
  const aliquotaITR = areaTotalHa <= 200 ? 0.0007 :  // pequena propriedade
                       areaTotalHa <= 500 ? 0.0014 :
                       areaTotalHa <= 1000 ? 0.0028 :
                       areaTotalHa <= 5000 ? 0.0070 : 0.0200;
  const vtnTotal = vtnHa * areaTotalHa;
  const itrAnual = vtnTotal * aliquotaITR;

  // === 3. Funrural ===
  // Alíquota 1,5% sobre receita bruta da comercialização (RS, pessoa física)
  // OU 4,8% sobre folha (raramente vale a pena para PJ rural)
  // Lei 13.606/2018 deu opção para 1,5% sobre faturamento
  const funruralReceita = receitaBruta * 0.015;
  const funruralFolha = receitaBruta * 0.048;  // estimativa - na verdade % da folha
  const funruralMelhor = 'receita';  // quase sempre

  // === 4. ICMS soja ===
  // RS tem DIFERIMENTO ICMS para venda intra-estado e exportação
  // Exportação: imunidade constitucional (LC 87/96)
  // Intra-estado (cooperativa): diferido até a saída do produto industrializado
  // Inter-estado outros estados: 12% mas com substituição tributária
  // Para venda à cooperativa RS ou exportação: 0%
  // Para venda balcão direto outra UF: 12% × receita (rara)

  // === 5. PIS/COFINS ===
  // Produtor PESSOA FÍSICA é IMUNE (CF art. 195 §13 + Lei 10.925/2004)
  // PIS/COFINS só incide se for PJ. Suspensão na agroindústria.
  // Esmagador paga PIS/COFINS mas recupera crédito presumido na exportação

  // === TOTAL CARGA TRIBUTÁRIA ===
  const irpfMin = Math.min(irpfSimplif, irpfLivro);
  const cargaTotal = irpfMin + itrAnual + funruralReceita;
  const cargaPct = (cargaTotal / receitaBruta) * 100;

  return (
    <div>
      {/* Inputs */}
      <div style={{fontSize: 11, color: '#A89968', marginBottom: 6, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5}}>▸ DADOS DA PROPRIEDADE</div>
      <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(170px, 1fr))', gap: 8, marginBottom: 14}}>
        <div style={S.inputBlock}>
          <label style={S.inputLabel}>Receita bruta R$/ano</label>
          <input type="number" value={receitaBruta} step="50000" onChange={e => setReceitaBruta(parseFloat(e.target.value)||0)} />
        </div>
        <div style={S.inputBlock}>
          <label style={S.inputLabel}>Despesas operacionais R$/ano</label>
          <input type="number" value={despesasOp} step="50000" onChange={e => setDespesasOp(parseFloat(e.target.value)||0)} />
        </div>
        <div style={S.inputBlock}>
          <label style={S.inputLabel}>Área total (ha)</label>
          <input type="number" value={areaTotalHa} step="10" onChange={e => setAreaTotalHa(parseFloat(e.target.value)||0)} />
        </div>
        <div style={S.inputBlock}>
          <label style={S.inputLabel}>Área plantada (ha)</label>
          <input type="number" value={areaPlantada} step="10" onChange={e => setAreaPlantada(parseFloat(e.target.value)||0)} />
        </div>
        <div style={S.inputBlock}>
          <label style={S.inputLabel}>VTN R$/ha (Valor Terra Nua)</label>
          <input type="number" value={vtnHa} step="500" onChange={e => setVtnHa(parseFloat(e.target.value)||0)} />
        </div>
      </div>

      {/* IR PESSOA FÍSICA */}
      <div style={{fontSize: 12, color: '#9C7DBF', marginBottom: 6, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 1, fontWeight: 600}}>★ IR PESSOA FÍSICA RURAL · comparativo opções</div>
      <div style={{padding: 10, background: '#0F1410', borderLeft: '3px solid #9C7DBF', marginBottom: 14, fontSize: 11, color: '#A89968', lineHeight: 1.5}}>
        Você pode optar a cada ano por <strong>Declaração Simplificada</strong> (base = 20% da receita, sem precisa comprovar) OU <strong>Livro Caixa</strong> (base = receita - despesas comprovadas, mais trabalhoso mas pode pagar menos).
      </div>
      <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 14}}>
        <div style={{padding: 12, background: '#181C18', borderLeft: '3px solid ' + (irpfMelhor === 'simplificada' ? '#C8E04A' : '#A89968')}}>
          <div style={{fontSize: 10, color: '#A89968', letterSpacing: 1}}>SIMPLIFICADA · 20% receita</div>
          <div style={{fontSize: 11, color: '#A89968', marginTop: 4}}>Base: R$ {baseSimplificada.toLocaleString('pt-BR', {maximumFractionDigits: 0})}</div>
          <div style={{fontFamily: "'IBM Plex Mono', monospace", fontSize: 20, color: '#E6B84A', fontWeight: 600, marginTop: 4}}>
            R$ {irpfSimplif.toLocaleString('pt-BR', {maximumFractionDigits: 0})}/ano
          </div>
          {irpfMelhor === 'simplificada' && <div style={{fontSize: 10, color: '#C8E04A', marginTop: 2}}>★ OPÇÃO MELHOR</div>}
        </div>
        <div style={{padding: 12, background: '#181C18', borderLeft: '3px solid ' + (irpfMelhor === 'livro' ? '#C8E04A' : '#A89968')}}>
          <div style={{fontSize: 10, color: '#A89968', letterSpacing: 1}}>LIVRO CAIXA · receita - despesas</div>
          <div style={{fontSize: 11, color: '#A89968', marginTop: 4}}>Base: R$ {baseLivroCaixa.toLocaleString('pt-BR', {maximumFractionDigits: 0})}</div>
          <div style={{fontFamily: "'IBM Plex Mono', monospace", fontSize: 20, color: '#E6B84A', fontWeight: 600, marginTop: 4}}>
            R$ {irpfLivro.toLocaleString('pt-BR', {maximumFractionDigits: 0})}/ano
          </div>
          {irpfMelhor === 'livro' && <div style={{fontSize: 10, color: '#C8E04A', marginTop: 2}}>★ OPÇÃO MELHOR · economia R$ {(irpfSimplif - irpfLivro).toFixed(0)}/ano</div>}
        </div>
      </div>

      {/* ITR */}

            <li><strong>Compensação prejuízos rurais</strong>: prejuízo de anos anteriores (ex: 2022 quebra) pode ser compensado em anos lucrativos (2023, 2025). Carryforward sem limite de prazo.</li>
            <li><strong>Pró-labore × distribuição lucros</strong> (PJ rural): em ano bom, distribuição de lucros é isenta de IR; pró-labore tem INSS. Otimize a proporção.</li>

// ============================================================
// BLOCO DECISÃO ESTRATÉGICA · 3 cenários com probabilidades (SIDRA real)
// A) Plantar SÓ própria · B) Próprio + Arrendar adicional · C) CDI
// ============================================================
function DecisaoEstrategicaBloco() {
  // === INPUTS ===
  const [areaPropriaHa, setAreaPropriaHa] = useState(200);
  const [areaArrendarHa, setAreaArrendarHa] = useState(100);   // ha disponível para arrendar
  const [arrendamentoSc, setArrendamentoSc] = useState(20);    // sc/ha pagas em terra
  const [precoEsperado, setPrecoEsperado] = useState(130);     // R$/sc
  const [custoFixoSemTerra, setCustoFixoSemTerra] = useState(1500); // R$/ha
  const [custoVarHa, setCustoVarHa] = useState(2850);          // R$/ha
  const [cdiAnual, setCdiAnual] = useState(13.5);              // % a.a.
  const [iorCdi, setIorCdi] = useState(17.5);                  // IR sobre CDI (15-22.5%)
  const [capitalDisponivel, setCapitalDisponivel] = useState(2000000); // R$ disponível

  // === DISTRIBUIÇÃO PROBABILÍSTICA · 25 anos SIDRA 2000-2024 (JC) ===
  // Bucketing por produtividade observada
  const buckets = useMemo(() => {
    const all = [
      ...Object.values(PRODUTIVIDADE_JC).filter(p => p.scHa > 0).map(p => p.scHa),
      ...Object.values(PROD_JC_EXTENDED).map(p => p.scHa),
    ].filter(s => s > 0 && s < 80);
    const n = all.length;
    const qSev    = all.filter(s => s < 25).length;       // <25 sc/ha
    const qMod    = all.filter(s => s >= 25 && s < 35).length;  // 25-35
    const norm    = all.filter(s => s >= 35 && s < 50).length;  // 35-50
    const boa     = all.filter(s => s >= 50).length;            // 50+
    return {
      qSevProd:  all.filter(s => s < 25).reduce((a,b)=>a+b,0) / (qSev || 1),
      qModProd:  all.filter(s => s >= 25 && s < 35).reduce((a,b)=>a+b,0) / (qMod || 1),
      normProd:  all.filter(s => s >= 35 && s < 50).reduce((a,b)=>a+b,0) / (norm || 1),
      boaProd:   all.filter(s => s >= 50).reduce((a,b)=>a+b,0) / (boa || 1),
      qSevP: qSev / n, qModP: qMod / n, normP: norm / n, boaP: boa / n,
      mediaProd: all.reduce((a,b)=>a+b,0) / n,
      desvio: Math.sqrt(all.reduce((s,x) => s + Math.pow(x - all.reduce((a,b)=>a+b,0)/n, 2), 0) / n),
      n,
    };
  }, []);

  // === CÁLCULOS BASE POR HECTARE ===
  // Custo fixo R$/ha (sem terra) — vale para terra própria e arrendada
  // Para arrendada: + arrendamento (sc/ha × preço)
  const cenarios = useMemo(() => {
    const arrendamentoRSha = arrendamentoSc * precoEsperado;  // R$/ha pago em terra arrendada

    // Helper: rentabilidade R$/ha para uma produtividade dada
    function rentHa(prodSc, terraAlugada) {
      const receita = prodSc * precoEsperado;
      const custoFixo = custoFixoSemTerra + (terraAlugada ? arrendamentoRSha : 0);
      // Variável escala parcialmente com prod (80% fixo do total variável + 20% variável com prod)
      const custoVar = custoVarHa * 0.80 + custoVarHa * 0.20 * (prodSc / 50);
      return receita - custoFixo - custoVar;
    }

    // Esperança matemática ponderada por probabilidades históricas
    function esperancaHa(terraAlugada) {
      return (
        buckets.qSevP * rentHa(buckets.qSevProd, terraAlugada) +
        buckets.qModP * rentHa(buckets.qModProd, terraAlugada) +
        buckets.normP * rentHa(buckets.normProd, terraAlugada) +
        buckets.boaP  * rentHa(buckets.boaProd,  terraAlugada)
      );
    }

    // === CENÁRIO A: Só área própria (não arrenda nada) ===
    const A_rentHa = esperancaHa(false);
    const A_total = A_rentHa * areaPropriaHa;
    const A_capitalLivre = capitalDisponivel;  // não compromete capital em arrendamento
    // Como capital fica ocioso, parte poderia ir para CDI (até o custeio: custoFixoSemTerra + custoVarHa)*areaPropriaHa = custeio
    const A_custeio = (custoFixoSemTerra + custoVarHa) * areaPropriaHa;
    const A_capitalSobra = Math.max(0, capitalDisponivel - A_custeio);
    const A_cdiAnual = A_capitalSobra * (cdiAnual / 100) * (1 - iorCdi / 100);

    // === CENÁRIO B: Própria + arrenda área adicional ===
    const B_rentPropria = esperancaHa(false) * areaPropriaHa;
    const B_rentArrendada = esperancaHa(true) * areaArrendarHa;
    const B_total = B_rentPropria + B_rentArrendada;
    const B_custeio = (custoFixoSemTerra + custoVarHa) * (areaPropriaHa + areaArrendarHa) +
                      arrendamentoSc * precoEsperado * areaArrendarHa;
    const B_capitalSobra = Math.max(0, capitalDisponivel - B_custeio);
    const B_cdiAnual = B_capitalSobra * (cdiAnual / 100) * (1 - iorCdi / 100);

    // === CENÁRIO C: Não planta NADA, tudo em CDI ===
    const C_total = capitalDisponivel * (cdiAnual / 100) * (1 - iorCdi / 100);

    // === Value at Risk · pior cenário 5% (assumindo quebra severa em todos os ha) ===
    const A_VaR = rentHa(buckets.qSevProd, false) * areaPropriaHa;
    const B_VaR = rentHa(buckets.qSevProd, false) * areaPropriaHa + rentHa(buckets.qSevProd, true) * areaArrendarHa;
    const C_VaR = C_total;  // CDI não tem risco material

    // Prob de margem POSITIVA (rent > 0)
    function probPositivo(terraAlugada) {
      return (buckets.qSevP * (rentHa(buckets.qSevProd, terraAlugada) > 0 ? 1 : 0) +
              buckets.qModP * (rentHa(buckets.qModProd, terraAlugada) > 0 ? 1 : 0) +
              buckets.normP * (rentHa(buckets.normProd, terraAlugada) > 0 ? 1 : 0) +
              buckets.boaP  * (rentHa(buckets.boaProd,  terraAlugada) > 0 ? 1 : 0));
    }

    return {
      A: {
        rentTotal: A_total, cdiBonus: A_cdiAnual, total: A_total + A_cdiAnual,
        rentHa: A_rentHa, capitalEmpregado: A_custeio, capitalSobra: A_capitalSobra,
        VaR: A_VaR, probPos: probPositivo(false),
      },
      B: {
        rentTotal: B_total, cdiBonus: B_cdiAnual, total: B_total + B_cdiAnual,
        rentPropria: B_rentPropria, rentArrendada: B_rentArrendada,
        capitalEmpregado: B_custeio, capitalSobra: B_capitalSobra,
        VaR: B_VaR, probPos: probPositivo(true),
      },
      C: {
        rentTotal: 0, cdiBonus: C_total, total: C_total,
        VaR: C_VaR, probPos: 1.00,
      },
      // Por bucket (para tabela detalhada)
      detail: {
        qSev: { prod: buckets.qSevProd, p: buckets.qSevP,
                A: rentHa(buckets.qSevProd, false) * areaPropriaHa,
                B: rentHa(buckets.qSevProd, false) * areaPropriaHa + rentHa(buckets.qSevProd, true) * areaArrendarHa },
        qMod: { prod: buckets.qModProd, p: buckets.qModP,
                A: rentHa(buckets.qModProd, false) * areaPropriaHa,
                B: rentHa(buckets.qModProd, false) * areaPropriaHa + rentHa(buckets.qModProd, true) * areaArrendarHa },
        norm: { prod: buckets.normProd, p: buckets.normP,
                A: rentHa(buckets.normProd, false) * areaPropriaHa,
                B: rentHa(buckets.normProd, false) * areaPropriaHa + rentHa(buckets.normProd, true) * areaArrendarHa },
        boa:  { prod: buckets.boaProd, p: buckets.boaP,
                A: rentHa(buckets.boaProd, false) * areaPropriaHa,
                B: rentHa(buckets.boaProd, false) * areaPropriaHa + rentHa(buckets.boaProd, true) * areaArrendarHa },
      },
    };
  }, [areaPropriaHa, areaArrendarHa, arrendamentoSc, precoEsperado, custoFixoSemTerra, custoVarHa, cdiAnual, iorCdi, capitalDisponivel, buckets]);

  // Identifica melhor cenário
  const melhor = cenarios.A.total > cenarios.B.total
    ? (cenarios.A.total > cenarios.C.total ? 'A' : 'C')
    : (cenarios.B.total > cenarios.C.total ? 'B' : 'C');

  return (
    <div>
      {/* Inputs */}
      <div style={{fontSize: 11, color: '#A89968', marginBottom: 6, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5}}>▸ PARÂMETROS DE DECISÃO</div>
      <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 8, marginBottom: 14}}>
        <div style={S.inputBlock}>
          <label style={S.inputLabel}>Área PRÓPRIA (ha)</label>
          <input type="number" value={areaPropriaHa} step="10" onChange={e => setAreaPropriaHa(parseFloat(e.target.value)||0)} />
        </div>
        <div style={S.inputBlock}>
          <label style={S.inputLabel}>Área disponível para ARRENDAR (ha)</label>
          <input type="number" value={areaArrendarHa} step="10" onChange={e => setAreaArrendarHa(parseFloat(e.target.value)||0)} />
        </div>
        <div style={S.inputBlock}>
          <label style={S.inputLabel}>Arrendamento sc/ha (JC=20)</label>
          <input type="number" value={arrendamentoSc} step="1" onChange={e => setArrendamentoSc(parseFloat(e.target.value)||0)} />
        </div>
        <div style={S.inputBlock}>
          <label style={S.inputLabel}>Preço esperado soja R$/sc</label>
          <input type="number" value={precoEsperado} step="5" onChange={e => setPrecoEsperado(parseFloat(e.target.value)||0)} />
        </div>
        <div style={S.inputBlock}>
          <label style={S.inputLabel}>Custo fixo BASE R$/ha (sem terra)</label>
          <input type="number" value={custoFixoSemTerra} step="100" onChange={e => setCustoFixoSemTerra(parseFloat(e.target.value)||0)} />
        </div>
        <div style={S.inputBlock}>
          <label style={S.inputLabel}>Custo variável R$/ha</label>
          <input type="number" value={custoVarHa} step="100" onChange={e => setCustoVarHa(parseFloat(e.target.value)||0)} />
        </div>
        <div style={S.inputBlock}>
          <label style={S.inputLabel}>CDI anual %</label>
          <input type="number" value={cdiAnual} step="0.5" onChange={e => setCdiAnual(parseFloat(e.target.value)||0)} />
        </div>
        <div style={S.inputBlock}>
          <label style={S.inputLabel}>IR sobre CDI % (15-22.5)</label>
          <input type="number" value={iorCdi} step="0.5" onChange={e => setIorCdi(parseFloat(e.target.value)||0)} />
        </div>
        <div style={S.inputBlock}>
          <label style={S.inputLabel}>Capital disponível R$</label>
          <input type="number" value={capitalDisponivel} step="100000" onChange={e => setCapitalDisponivel(parseFloat(e.target.value)||0)} />
        </div>
      </div>

      {/* Tabela de Distribuição Histórica SIDRA */}
      <div style={{fontSize: 11, color: '#9C7DBF', marginBottom: 6, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.5}}>▸ DISTRIBUIÇÃO PROBABILÍSTICA · BASEADA EM 25 ANOS SIDRA (2000-2024)</div>
      <div style={{padding: 10, background: '#0F1410', borderLeft: '3px solid #9C7DBF', marginBottom: 14, fontSize: 11, color: '#A89968'}}>
        Frequências históricas de cenários climáticos em JC/RS calculadas dos dados oficiais SIDRA. Média {buckets.mediaProd.toFixed(1)} sc/ha · desvio-padrão {buckets.desvio.toFixed(1)} sc/ha · n={buckets.n} anos.
      </div>
      <div style={{display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8, marginBottom: 16}}>
        {[
          { lbl:'QUEBRA SEVERA', sub:'<25 sc/ha', prod:buckets.qSevProd, p:buckets.qSevP, cor:'#7B1A1A' },
          { lbl:'QUEBRA',         sub:'25-35 sc/ha', prod:buckets.qModProd, p:buckets.qModP, cor:'#D9542B' },
          { lbl:'NORMAL',         sub:'35-50 sc/ha', prod:buckets.normProd, p:buckets.normP, cor:'#E6B84A' },
          { lbl:'BOA',            sub:'≥50 sc/ha', prod:buckets.boaProd, p:buckets.boaP, cor:'#C8E04A' },
        ].map((b,i) => (
          <div key={i} style={{padding:10, background:'#181C18', borderLeft:`3px solid ${b.cor}`}}>
            <div style={{fontSize:10, color:b.cor, letterSpacing:1}}>{b.lbl}</div>
            <div style={{fontSize:9, color:'#A89968', marginTop:2}}>{b.sub}</div>
            <div style={{fontFamily:"'IBM Plex Mono', monospace", fontSize:18, color:'#E8E2D0', fontWeight:700, marginTop:4}}>
              {(b.p*100).toFixed(0)}%
            </div>
            <div style={{fontSize:10, color:'#A89968'}}>média {b.prod.toFixed(1)} sc/ha</div>
          </div>
        ))}
      </div>

      {/* TABELA COMPARATIVA · 3 CENÁRIOS */}

// BLOCO CUSTO vs CBOT · evolução histórica do custo Conab como % do preço CBOT
// Resposta direta: 2010 = 61% · 2026 = 77%. Custo subiu ~10% acima do CBOT real em 16 anos.
// ============================================================
function CustoVsCbotBloco() {
  // Calcula média anual CBOT + dólar a partir de HISTORICO trimestral
  const dadosAnuais = useMemo(() => {
    const byAno = {};
    HISTORICO.forEach(h => {
      const ano = 2000 + parseInt(h.t.substring(0, 2));
      if (!byAno[ano]) byAno[ano] = { cbots: [], dolares: [] };
      byAno[ano].cbots.push(h.cbot);
      byAno[ano].dolares.push(h.dolar);
    });
    return Object.entries(byAno).map(([ano, d]) => {
      const cbotMed = d.cbots.reduce((s,v)=>s+v,0) / d.cbots.length;
      const dolarMed = d.dolares.reduce((s,v)=>s+v,0) / d.dolares.length;
      const cbotBrl = cbotMed * 2.2046 * dolarMed;  // R$/saca FOB Paranaguá teórico
      const custo = MACRO_ANUAL[ano]?.custo || 0;
      const pctCusto = cbotBrl > 0 ? (custo / cbotBrl * 100) : 0;
      const margem = cbotBrl - custo;
      const margemPct = cbotBrl > 0 ? (margem / cbotBrl * 100) : 0;
      return {
        ano: parseInt(ano),
        cbotUSD: Math.round(cbotMed * 100) / 100,
        dolar: Math.round(dolarMed * 100) / 100,
        cbotBrl: Math.round(cbotBrl * 100) / 100,
        custo,
        pctCusto: Math.round(pctCusto * 10) / 10,
        margem: Math.round(margem * 100) / 100,
        margemPct: Math.round(margemPct * 10) / 10,
      };
    });
  }, []);

  const ano2010 = dadosAnuais.find(d => d.ano === 2010);
  const anoAtual = dadosAnuais[dadosAnuais.length - 1];
  const piorAno = dadosAnuais.reduce((max, d) => d.pctCusto > max.pctCusto ? d : max, dadosAnuais[0]);
  const melhorAno = dadosAnuais.reduce((min, d) => d.pctCusto < min.pctCusto ? d : min, dadosAnuais[0]);
  const mediaPct = dadosAnuais.reduce((s, d) => s + d.pctCusto, 0) / dadosAnuais.length;

  return (
    <div>
      {/* Resposta direta */}
      <div style={{padding: 14, background: '#1A211A', borderLeft: '3px solid #C8E04A', marginBottom: 14, fontSize: 13, color: '#E8E2D0', lineHeight: 1.6}}>
        <div style={{fontSize: 12, color: '#C8E04A', letterSpacing: 1, marginBottom: 8, fontFamily: "'IBM Plex Mono', monospace"}}>★ RESPOSTA DIRETA À PERGUNTA</div>
        <strong>2010:</strong> custo era R$ 27/sc · preço CBOT equivalente R$ 44/sc · <strong style={{color:'#C8E04A'}}>61% do CBOT</strong>. Margem 39%.<br/>
        <strong>2026:</strong> custo é R$ 95/sc · preço CBOT equivalente R$ 123/sc · <strong style={{color:'#D9542B'}}>77% do CBOT</strong>. Margem 23%.<br/>
        <strong style={{color:'#FF7F50'}}>→ Custo cresceu mais rápido que preço:</strong> consumiu 16 pontos percentuais da margem em 16 anos. O custo Conab triplicou (+252%); o preço CBOT em R$ triplicou também (+180%) mas porque o real desvalorizou ~3×.
      </div>

      {/* Cards-resumo */}
      <div style={{display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10, marginBottom: 14}}>
        <div style={{padding: 12, background: '#181C18', borderLeft: '3px solid #C8E04A'}}>
          <div style={{fontSize: 10, color: '#C8E04A', letterSpacing: 1}}>MELHOR ANO</div>
          <div style={{fontFamily: "'IBM Plex Mono', monospace", fontSize: 18, color: '#C8E04A', fontWeight: 700}}>{melhorAno.ano}</div>
          <div style={{fontSize: 11, color: '#A89968'}}>{melhorAno.pctCusto.toFixed(1)}% custo · margem {melhorAno.margemPct.toFixed(1)}%</div>
        </div>
        <div style={{padding: 12, background: '#181C18', borderLeft: '3px solid #D9542B'}}>
          <div style={{fontSize: 10, color: '#D9542B', letterSpacing: 1}}>PIOR ANO</div>
          <div style={{fontFamily: "'IBM Plex Mono', monospace", fontSize: 18, color: '#D9542B', fontWeight: 700}}>{piorAno.ano}</div>
          <div style={{fontSize: 11, color: '#A89968'}}>{piorAno.pctCusto.toFixed(1)}% custo · margem {piorAno.margemPct.toFixed(1)}%</div>
        </div>
        <div style={{padding: 12, background: '#181C18', borderLeft: '3px solid #E6B84A'}}>

      {/* Insights */}

        <strong style={{color: '#E8E2D0'}}>📊 Padrões revelados:</strong>
        <ol style={{margin: '6px 0 0 16px', padding: 0}}>
          <li><strong>2010-2013: idade de ouro</strong> (60-63% custo) — pós-crise + China comprando + dólar fraco em real. Margem 37-40%.</li>
          <li><strong>2014-2019: aperto histórico</strong> (70-84% custo) — preço CBOT caiu (super-ciclo terminou), custo continuou subindo. Pior ano: <strong>2019 a 84% do CBOT</strong> = margem só 16%.</li>
          <li><strong>2020-2023: novo boom</strong> (56-67% custo) — COVID + China + Ucrânia + dólar a R$ 5+. <strong>2021 = MELHOR ano</strong> (56%). Margem 44%.</li>
          <li><strong>2024-2026: voltou ao aperto</strong> (69-77% custo) — CBOT caiu para 10-11 USD/bu, custo subiu (NPK alto + arrendamento). Estamos em <strong>77%</strong> = margem 23% (abaixo da média 70%).</li>
        </ol>
        <div style={{marginTop: 8, padding: 8, background: '#1A1410', borderLeft: '2px solid #FF7F50'}}>
          <strong style={{color: '#FF7F50'}}>Insight crítico:</strong> a margem do produtor brasileiro depende muito mais do <strong>nível absoluto do CBOT em USD</strong> e do <strong>dólar</strong> do que da inflação dos custos. Quando CBOT &gt;13 USD/bu + dólar &gt;5 R$, margem fica boa mesmo com custo alto. Quando CBOT cai abaixo de 10,5 + dólar abaixo de 5,3, a coisa aperta — independente do quanto o custo subiu nominalmente.
        </div>
      </div>
    </div>
  );
}

      const v1 = localStorage.getItem('painelSoja_custos');

          cenarioAtivoId: null,

          historicoVersoes: [],

    } catch (e) {}
    return {
      cenarioAtivoId: null,
      custosAtuais: initDefault(),
      cenarios: [],
      historicoVersoes: [],

  const custosUsuario = custosConfig.custosAtuais;
  const [custosTabAtiva, setCustosTabAtiva] = useState('variavel');

    .reduce((s, [k]) => s + (custosUsuario[k] || 0), 0);
  const custoFixoBase = Object.entries(CUSTOS_REF_CONAB)
    .filter(([k, v]) => v.tipo === 'fixo')
    .reduce((s, [k]) => s + (custosUsuario[k] || 0), 0);

  // === HELPERS DE PERSISTÊNCIA ===
  const persistir = (newConfig) => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(newConfig));
      setCustosConfig(newConfig);

  const setCustoItem = (key, val) => {

  const resetCustosConab = () => {

    conab_estrito: {
      nome: 'CONAB nominal',

      icone: '★',
      cor: '#C8E04A',
      custos: initDefault(),
    },
    premium: {
      nome: 'PREMIUM JC',
      desc: 'Manejo intensivo · insumos top + consultoria completa + seguros · ~R$ 6.200/ha sem terra · R$ 165-180/sc com terra real',
      icone: '💎',
      cor: '#E6B84A',
      custos: {
        sementes:450, royaltyTransg:90, tratSementes:80, inoculante:50,
        fertNPK:1100, calcario:150, analiseSolo:40,
        herbicida:580, fungicida:520, inseticida:280,
        combustivel:320, maoOperacional:220, encargosSociais:65,
        manutencaoMaq:290, freteColheita:80, secagem:95,
        consultoria:300, seguroProd:230,
        depMaq:450, depBenf:80, jurosCap:230, finCusteio:290,
        maoFixa:270, admin:180, segurosGerais:120, itr:40, manutBenf:85,
      }
    },
  };
  const aplicarPreset = (presetKey) => {
    const p = PRESETS[presetKey];
    if (!p) return;
    if (!confirm(`Aplicar preset "${p.nome}"? Sua edição atual será substituída (cenários salvos ficam intactos).`)) return;

  };
  const salvarComoCenario = () => {
    const nome = novoCenarioNome.trim();
    if (!nome) { alert('Digite um nome para o cenário'); return; }
    const agora = new Date().toISOString();
    const idExistente = custosConfig.cenarios.find(c => c.nome === nome)?.id;
    const id = idExistente || 'cen_' + Date.now();
    const novosCenarios = idExistente
      ? custosConfig.cenarios.map(c => c.id === idExistente ? { ...c, custos: custosUsuario, atualizadoEm: agora } : c)
      : [...custosConfig.cenarios, { id, nome, custos: { ...custosUsuario }, criadoEm: agora, atualizadoEm: agora }];
    const novoHist = [
      { timestamp: agora, cenarioNome: nome, custos: { ...custosUsuario }, acao: idExistente ? 'atualizou' : 'criou' },
      ...custosConfig.historicoVersoes,
    ].slice(0, 50);
    persistir({ ...custosConfig, cenarios: novosCenarios, cenarioAtivoId: id, historicoVersoes: novoHist });
    setNovoCenarioNome(''); setShowCenarioDialog(false);
  };
  const carregarCenario = (id) => {
    const cen = custosConfig.cenarios.find(c => c.id === id);
    if (!cen) return;

  const deletarCenario = (id) => {

  const exportarJSON = () => {

  const [compararA, setCompararA] = useState(null);

  const prodEsperada = 50;
  const [custoFert, setCustoFert] = useState(3500);

  const [expPremio, setExpPremio] = useState('neutra');

  const [tourAberto, setTourAberto] = useState(() => {
    try {
      return !localStorage.getItem('painelSoja_tourCompleted');
    } catch (e) { return false; }
  });
  const [fundVer, setFundVer] = useState('mundial');
  // Balcão Cotrijuc soja — cotação real do dia (cotrijuc.com.br/graos)
  // 17/06/2026: Soja R$ 114,50
  const [balcaoSoja, setBalcaoSoja] = useState(114.50);

  const [prodSoja, setProdSoja] = useState(55);

  const [pctTravadoSoja, setPctTravadoSoja] = useState(35);

  const [mercVer, setMercVer] = useState('crush');

  // === DERIVADOS DE CUSTO ===
  // Custo terra efetivo: arrendamento sc/ha × % arrendada × preço CIF JC
  const custoTerraHa = arrendamentoScHa * (pctArrendada / 100) * balcaoSoja;
  const custoFixoHa = custoFixoBase + custoTerraHa;

  // === HISTÓRICO RECOMPUTADO COM CONFIG DO USUÁRIO ===
  // Para cada trimestre/ano: substitui a "renda da terra" do Conab (~14 sc/ha implícito)
  // pelo arrendamento real configurado nos sliders (arrendamentoScHa × pctArrendada)
  const TERRA_CONAB_SC_HA = 14;
  const HISTORICO_MULTI_CUSTOM = useMemo(() => {
    let margemAcc = 0, receitaAcc = 0, yieldIdx = 100;
    return HISTORICO_MULTI.map(h => {
      const ano = 2000 + parseInt(h.t.substring(0, 2));
      const macro = MACRO_ANUAL[ano] || {};
      const precoTrim = h.soja;
      const custoConab = macro.custo;
      // Remove a terra Conab implícita e adiciona a terra real do usuário
      const terraConabSc = TERRA_CONAB_SC_HA * precoTrim / 50;
      const custoBaseSc = custoConab - terraConabSc;
      const terraRealSc = (arrendamentoScHa * (pctArrendada/100) * precoTrim) / 50;
      const custoCustomSc = custoBaseSc + terraRealSc;
      const margemLiq = precoTrim - custoCustomSc;
      const margemPct = precoTrim > 0 ? (margemLiq / precoTrim) * 100 : 0;
      margemAcc += margemLiq;
      receitaAcc += precoTrim;
      yieldIdx += margemPct;
      return {
        ...h,
        custoSoja: Math.round(custoCustomSc * 100) / 100,
        custoVar: Math.round(custoCustomSc * 0.55 * 100) / 100,
        custoFixo: Math.round(custoCustomSc * 0.45 * 100) / 100,
        margem: Math.round(margemLiq * 100) / 100,
        margemLiquida: Math.round(margemLiq * 100) / 100,
        margemBruta: Math.round((precoTrim - custoCustomSc * 0.55) * 100) / 100,
        margemBrutaPct: precoTrim > 0 ? Math.round(((precoTrim - custoCustomSc*0.55) / precoTrim) * 1000) / 10 : 0,
        margemLiquidaPct: Math.round(margemPct * 10) / 10,
        margemAcc: Math.round(margemAcc * 100) / 100,
        margemAccPct: receitaAcc > 0 ? Math.round((margemAcc / receitaAcc) * 1000) / 10 : 0,
        margemYieldIdx: Math.round(yieldIdx * 10) / 10,
        custoTotalNorm: Math.round((custoCustomSc / HISTORICO_MULTI[0].custoSoja) * 100),
        custoVarNorm: Math.round(((custoCustomSc * 0.55) / (HISTORICO_MULTI[0].custoSoja * 0.55)) * 100),
        custoFixoNorm: Math.round(((custoCustomSc * 0.45) / (HISTORICO_MULTI[0].custoSoja * 0.45)) * 100),
      };
    });
  }, [arrendamentoScHa, pctArrendada]);

  // Recalcula MARGEM_ANUAL e RENTABILIDADE_REAL_JC com a config
  const MARGEM_ANUAL_CUSTOM = useMemo(() => {
    return MARGEM_ANUAL.map(m => {
      const terraConabSc = TERRA_CONAB_SC_HA * m.precoMedio / 50;
      const custoBaseSc = m.custoTotal - terraConabSc;
      const terraRealSc = (arrendamentoScHa * (pctArrendada/100) * m.precoMedio) / 50;
      const custoCustomSc = custoBaseSc + terraRealSc;
      const margemLiq = m.precoMedio - custoCustomSc;
      const margemBruta = m.precoMedio - custoCustomSc * 0.55;
      return {
        ...m,
        custoTotal: Math.round(custoCustomSc * 100) / 100,
        custoVar: Math.round(custoCustomSc * 0.55 * 100) / 100,
        custoFixo: Math.round(custoCustomSc * 0.45 * 100) / 100,
        margemBruta: Math.round(margemBruta * 100) / 100,
        margemLiquida: Math.round(margemLiq * 100) / 100,
        margemBrutaPct: m.precoMedio > 0 ? Math.round((margemBruta / m.precoMedio) * 1000) / 10 : 0,
        margemLiquidaPct: m.precoMedio > 0 ? Math.round((margemLiq / m.precoMedio) * 1000) / 10 : 0,
        margemBrutaHa: Math.round(margemBruta * 55),
        margemLiquidaHa: Math.round(margemLiq * 55),
      };
    });
  }, [arrendamentoScHa, pctArrendada]);

  const RENT_JC_CUSTOM = useMemo(() => {
    let _acc = 0;
    return MARGEM_ANUAL_CUSTOM.map(m => {
      const p = PRODUTIVIDADE_JC[m.ano] || { kgHa:0, scHa:0, status:'?', obs:'sem dado' };
      const custoTotalHa_ = m.custoTotal * 50;
      const custoFixoHa_ = custoTotalHa_ * 0.80;
      const custoVarHaBase = custoTotalHa_ * 0.20;
      const custoVarHaReal = p.scHa > 0 ? custoVarHaBase * (p.scHa / 50) : 0;
      const custoTotalHaReal = custoFixoHa_ + custoVarHaReal;
      const custoRealSaca = p.scHa > 0 ? custoTotalHaReal / p.scHa : 0;
      const receitaHa = m.precoMedio * p.scHa;
      const rentReal = Math.round(receitaHa - custoTotalHaReal);
      const margemRealSaca = m.precoMedio - custoRealSaca;
      _acc += rentReal;
      return {
        ano: m.ano, prodScHa: p.scHa, prodKgHa: p.kgHa, status: p.status, obs: p.obs,
        precoMedio: m.precoMedio, custoTotal: m.custoTotal,
        custoRealSaca: Math.round(custoRealSaca * 100) / 100,
        custoTotalHaReal: Math.round(custoTotalHaReal),
        margemLiquidaSaca: m.margemLiquida,
        margemRealSaca: Math.round(margemRealSaca * 100) / 100,
        margemLiquidaPct: m.margemLiquidaPct,
        margemRealPct: m.precoMedio > 0 ? Math.round((margemRealSaca / m.precoMedio) * 1000) / 10 : 0,
        receitaHa: Math.round(receitaHa),
        rentabilidadeHa: rentReal,
        rentabilidadeAcumulada: _acc,
        delta: 0,
      };
    });
  }, [MARGEM_ANUAL_CUSTOM]);

  const RENT_JC_RESUMO_CUSTOM = useMemo(() => {
    const d = RENT_JC_CUSTOM;
    return {
      prodMedia: Math.round(d.reduce((s, r) => s + r.prodScHa, 0) / d.length * 10) / 10,
      rentMedia: Math.round(d.reduce((s, r) => s + r.rentabilidadeHa, 0) / d.length),
      rentTotal: d.reduce((s, r) => s + r.rentabilidadeHa, 0),
      anosQuebra: d.filter(r => r.status.startsWith('quebra')).length,

      melhorAno: d.reduce((max, r) => r.prodScHa > max.prodScHa ? r : max, d[0]),
    };
  }, [RENT_JC_CUSTOM]);

  const custoSojaHa = custoFixoHa + custoVarHa;
  const custoSaca = prodSoja > 0 ? custoSojaHa / prodSoja : 0;
  const cvUnitario = prodSoja > 0 ? custoVarHa / prodSoja : 0;
  const mcUnitario = balcaoSoja - cvUnitario;
  const peSacasHa = mcUnitario > 0 ? custoFixoHa / mcUnitario : 0;
  const margemSeguranca = prodSoja > 0 ? ((prodSoja - peSacasHa) / prodSoja) * 100 : 0;

  // === CRUSH MARGIN ===
  // Consultor: 1 ton soja = 770kg farelo (45,5% prot) + 190kg óleo + 40kg perdas
  // Crush ($/ton soja) = 0,77 × farelo $/ton + 0,19 × óleo $/ton − preço soja $/ton
  // Óleo $/ton = óleo ¢/lb × 22,046
  const fareloBRLTon = fareloCBOT * dolar;
  const oleoBRLTon = (oleoCBOT * 22.046) * dolar;
  const sojaBRLTon = (cbot * dolar / BU_PER_SACA) * 1000 / 60;  // R$/ton da soja CBOT
  const crushBRLTon = 0.77 * fareloBRLTon + 0.19 * oleoBRLTon - sojaBRLTon;
  const crushBRLSaca = crushBRLTon * 0.06;  // 60kg = 0,06 ton
  // Crush histórico de referência: positivo R$ 20-80/saca; >R$ 80 = ótimo p/ esmagador
  const crushClass = crushBRLSaca > 60 ? 'alto' : crushBRLSaca > 20 ? 'normal' : crushBRLSaca > 0 ? 'apertado' : 'negativo';

  // === CRUSH CHINA — Esmagadoras DCE ===
  // Cadeia: produtor BR → exportador → CFR China → esmagador chinês → farelo/óleo doméstico
  // CFR China = FOB Santos + frete marítimo + seguro
  // FOB Santos USD/ton = (CBOT + prêmio) × 36,7437 (bu→ton) + custos portuários
  // Esmagador chinês compra a CFR e revende farelo/óleo no DCE
  const fobSantosUSDTon = (cbot + premio) * 36.7437 + 15;  // +$15 custos porto+logística embarcadora
  const cfrChinaUSDTon = fobSantosUSDTon + freteMaritimoUSD;
  // Tarifa de importação chinesa: 3% (rebaixada de 13% pós-2018)
  const cfrChinaComTarifaUSD = cfrChinaUSDTon * 1.03;
  // Receita do esmagador chinês: 0,80 × farelo + 0,18 × óleo (RMB/ton soja)
  const receitaChinaRMB = 0.80 * dceFareloRMB + 0.18 * dceOleoRMB;
  // Custo da soja em RMB
  const sojaChinaRMB = cfrChinaComTarifaUSD * usdCny;
  // Crush margin China em RMB/ton
  const crushChinaRMB = receitaChinaRMB - sojaChinaRMB;
  const crushChinaUSD = crushChinaRMB / usdCny;
  // Classificação: histórico saudável é $50-100/ton, apertado abaixo de $30, ruim < $0
  const crushChinaClass = crushChinaUSD > 100 ? 'excelente' :
                          crushChinaUSD > 50 ? 'saudavel' :
                          crushChinaUSD > 20 ? 'apertado' :
                          crushChinaUSD > 0 ? 'critico' : 'negativo';

  // Cálculos

  const sacaCIF = sacaFOB - freteCIF; // preço líquido em Júlio de Castilhos

  const estrategia = {

  const projecao = useMemo(() => {
    const ajuste = (exp, mag) => exp === 'alta' ? mag : exp === 'baixa' ? -mag : 0;
    const numPontos = Math.max(2, Math.min(36, parseInt(targetMeses) || 6)) + 1;
    const meses = [];
    for (let i = 0; i < numPontos; i++) meses.push('M' + i);
    const tCbot = parseFloat(targetCbot);
    const tPremio = parseFloat(targetPremio);
    const tDolar = parseFloat(targetDolar);
    const usaTargetCbot = !isNaN(tCbot);
    const usaTargetPremio = !isNaN(tPremio);
    const usaTargetDolar = !isNaN(tDolar);
    return meses.map((m, i) => {
      const t = i / (numPontos - 1);
      const c = usaTargetCbot ? cbot + (tCbot - cbot) * t : cbot * (1 + ajuste(expCbot, 0.15) * t);
      const p = usaTargetPremio ? premio + (tPremio - premio) * t : Math.max(-1, premio * (1 + ajuste(expPremio, 0.30) * t));
      const d = usaTargetDolar ? dolar + (tDolar - dolar) * t : dolar * (1 + ajuste(expDolar, 0.10) * t);
      const saca = Math.round(((c + p) * BU_PER_SACA * d - freteCIF) * 100) / 100;
      // Cenários extremos para banda de incerteza (+/-5% nos componentes)
      const cAlto = c * 1.05, pAlto = p * 1.05, dAlto = d * 1.05;
      const cBaixo = c * 0.95, pBaixo = p * 0.95, dBaixo = d * 0.95;
      const sacaAlto = Math.round(((cAlto + pAlto) * BU_PER_SACA * dAlto - freteCIF) * 100) / 100;
      const sacaBaixo = Math.round(((cBaixo + pBaixo) * BU_PER_SACA * dBaixo - freteCIF) * 100) / 100;
      return {
        mes: m,
        saca,
        sacaAlto,
        sacaBaixo,
        custo: custoSaca,
        cbotProj: Math.round(c * 100) / 100,
        premioProj: Math.round(p * 100) / 100,
        dolarProj: Math.round(d * 100) / 100,
      };
    });
  }, [cbot, premio, dolar, custoSaca, expCbot, expPremio, expDolar, freteCIF, targetCbot, targetPremio, targetDolar, targetMeses]);

  const simulacao = useMemo(() => {
    const iIni = HISTORICO_CALC.findIndex(h => h.t === periodoIni);
    const iFim = HISTORICO_CALC.findIndex(h => h.t === periodoFim);
    if (iIni < 0 || iFim < 0 || iFim <= iIni) return null;
    const janela = HISTORICO_CALC.slice(iIni, iFim + 1);
    const precos = janela.map(j => j.sacaCIF);
    const tudoInicio = precos[0];
    const tudoFim = precos[precos.length - 1];
    const escalonado = precos.reduce((a, b) => a + b, 0) / precos.length;
    let pctTravado = 0, somaTravada = 0;
    precos.forEach(p => {
      if (p >= gatilhoTrava && pctTravado < 100) {
        somaTravada += p * 0.25;
        pctTravado += 25;
      }
    });
    const restante = 100 - pctTravado;
    const gatilho = pctTravado > 0 ? (somaTravada + (restante / 100) * tudoFim) : tudoFim;
    const topo = Math.max(...precos);
    const fundo = Math.min(...precos);

    // === ANÁLISE PÓS-FATO: estratégias clássicas aplicadas a essa janela ===
    // Forward 40% no início: trava 40% no início + 60% à mercado no fim
    const forward40 = tudoInicio * 0.4 + tudoFim * 0.6;
    // Put protetiva: mantem upside, mas paga prêmio (~3% do preço)
    const premioPut = tudoInicio * 0.03;
    const putProtetiva = Math.max(tudoInicio, escalonado) - premioPut;
    // Carrego (estocagem) com custo R$ 1,20/sc/mês × 6m = R$ 7,20 + CDI
    const mesesCarrego = Math.min(6, precos.length - 1);
    const cdiMensal = Math.pow(1.135, 1/12) - 1;
    const custoCarregoTotal = 1.20 * mesesCarrego + tudoInicio * (Math.pow(1+cdiMensal, mesesCarrego) - 1);
    const carrego = precos[Math.min(mesesCarrego, precos.length-1)] - custoCarregoTotal;

    return { janela, tudoInicio, tudoFim, escalonado, gatilho, topo, fundo, forward40, putProtetiva, carrego, custoCarregoTotal };
  }, [periodoIni, periodoFim, gatilhoTrava]);

  const periodos = HISTORICO_CALC.map(h => h.t);

  // Normalização base 100 para comparação multi-commodity
  const multiData = useMemo(() => {
    const baseSoja = HISTORICO_MULTI[0].soja;
    const baseMilho = HISTORICO_MULTI[0].milho;
    const firstBoi = HISTORICO_MULTI.find(d => d.boi != null);
    const baseBoi = firstBoi ? firstBoi.boi : null;
    return HISTORICO_MULTI.map(d => ({
      ...d,
      sojaNorm: d.soja ? Math.round((d.soja / baseSoja) * 100) : null,
      milhoNorm: d.milho ? Math.round((d.milho / baseMilho) * 100) : null,
      boiNorm: d.boi && baseBoi ? Math.round((d.boi / baseBoi) * 100) : null,
    }));
  }, []);

  const corNivel = (n) => n === 'alto' ? '#C8E04A' : n === 'baixo' ? '#D9542B' : '#A89968';
  const corEstrat = (c) => c === 'verde' ? '#C8E04A' : c === 'vermelho' ? '#D9542B' : '#E6B84A';

  // Balcão Cotrijuc vs CEPEA — spread soja
  const spreadBalcaoSoja = balcaoSoja - sacaCIF;
  const spreadBalcaoSojaPct = sacaCIF > 0 ? (spreadBalcaoSoja / sacaCIF) * 100 : 0;

  // Margem soja por hectare (estilo SLC)
  const receitaSojaHa = prodSoja * balcaoSoja;
  const margemSojaHa = receitaSojaHa - custoSojaHa;
  const margemSojaPct = (margemSojaHa / custoSojaHa) * 100;

  // Relatório automático (estilo Agrinvest/Delara)
  const relatorio = useMemo(() => {
    const dataHoje = new Date().toLocaleDateString('pt-BR');
    const cenarioMacro = (() => {
      if (niveis.cbot === 'alto' && niveis.dolar === 'alto') return 'CONSTRUTIVO — janela rara de preços altos em USD e câmbio favorável simultaneamente.';
      if (niveis.cbot === 'baixo' && niveis.dolar === 'baixo') return 'DESAFIADOR — pressão dupla: Chicago fraco e real forte comprimem margem.';
      if (niveis.cbot === 'alto') return 'POSITIVO em Chicago, NEUTRO em câmbio. Trava de CBOT prioritária.';
      if (niveis.dolar === 'alto') return 'NEUTRO em Chicago, FAVORÁVEL em câmbio. Avaliar trava cambial.';
      return 'LATERAL — sem catalisadores claros nos três componentes; janela de espera.';
    })();
    const recSoja = (() => {
      const acoes = [estrategia.cbot, estrategia.premio, estrategia.dolar];
      const travarTotal = acoes.filter(a => a.pct >= 50).length;
      if (travarTotal >= 2) return `Travar 60-80% da safra em camadas — CBOT ${estrategia.cbot.pct}% · prêmio ${estrategia.premio.pct}% · câmbio ${estrategia.dolar.pct}%.`;
      const naoTravar = acoes.filter(a => a.pct === 0).length;
      if (naoTravar >= 2) return 'Postergar fixações. Considerar put protetiva (~strike próximo do custo) ou call de dólar para upside cambial.';
      return 'Trava parcial 30-50% nos componentes em patamar alto; manter aberto os fracos. Escalonar.';
    })();
    return {
      data: dataHoje,
      cenarioMacro,
      recSoja,
      base: Math.round(sacaCIF),
      otimista: Math.round(sacaCIF * 1.12),
      pessimista: Math.round(sacaCIF * 0.88),
    };
  }, [niveis, estrategia, sacaCIF]);

  const copiarRelatorio = () => {

    const txt = `RELATÓRIO SOJA — JÚLIO DE CASTILHOS / RS
${relatorio.data}

Balcão Cotrijuc ............ R$ ${balcaoSoja.toFixed(2)} (${spreadBalcaoSoja >= 0 ? '+' : ''}R$ ${spreadBalcaoSoja.toFixed(2)} · ${spreadBalcaoSojaPct.toFixed(1)}% vs CIF)

USD/BRL .................... R$ ${dolar.toFixed(2)} (${niveis.dolar.toUpperCase()})

Fontes: CEPEA/Esalq Paranaguá · Cotrijuc balcão`;
    navigator.clipboard?.writeText(txt);
    alert('Relatório copiado.');
  };

  return (

      {tourAberto && <TourGuiado onClose={() => setTourAberto(false)} />}

      {/* BOTÃO ? FLUTUANTE · reabre tour a qualquer momento */}
      <button
        onClick={() => setTourAberto(true)}

      >?</button>

      <header style={S.header}>

          <h1 className="h1" style={S.h1}>Margem da saca <span style={S.h1accent}>no campo</span></h1>
          <div style={S.subhead}>Soja CEPEA Paranaguá · Balcão Cotrijuc · Porto Rio Grande</div>
          <div style={{...S.subhead, color: '#C8E04A', marginTop: 4}}>★ Última cotação CEPEA: <strong>R$ 132,26/saca</strong> em <strong>16/06/2026</strong> · Dólar implícito R$ 5,09</div>
        </div>

        {/* 01 — COMPONENTES */}

            { key: 'cbot', val: cbot, set: setCbot, exp: expCbot, setExp: setExpCbot, target: targetCbot, setTarget: setTargetCbot, min: 7, max: 18, step: 0.05, fmt: v => v.toFixed(2), unit: 'USD/bu', tPlaceholder: '12,50' },
            { key: 'premio', val: premio, set: setPremio, exp: expPremio, setExp: setExpPremio, target: targetPremio, setTarget: setTargetPremio, min: -0.5, max: 3, step: 0.05, fmt: v => v.toFixed(2), unit: 'USD/bu', tPlaceholder: '0,80' },

          ].map(c => (

                          );
