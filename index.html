    sinonimos: 'Pré-venda, venda futura',
    descricao: 'Vende soja antes da colheita com preço travado (CBOT + prêmio + câmbio) para entrega num mês específico.',

  {

  {

    sinonimos: 'Vende futuro de soja na bolsa brasileira',
    descricao: 'Vende contrato futuro SFI/SOJ na B3 (Bovespa). Trava preço em reais por saca. Não envolve tradera.',
    quando: 'Produtor com volume grande, acesso a corretora, e que quer fixar preço em R$ direto sem amarrar venda física.',
    risco: 'Exige depósito de margem (R$ por contrato). Chamadas de margem se mercado subir. Liquidez da B3 é menor que CME.',
    exemplo: 'Vende 10 contratos SFI (27 ton cada) a R$ 145/saca para maio. Se preço cair para 130, ganha 15 × 450 sacas = R$ 6.750/contrato. Mas vende físico ao mercado a 130.',
    melhor_para: 'JC/RS: opção para quem entrega físico em indústria local (Passo Fundo, Marau) e quer hedge desvinculado do destino.',
  },
  {
    nome: 'Estocagem estratégica',
    sinonimos: 'Carrego, venda entressafra',
    descricao: 'Armazena soja pós-colheita para vender em momento melhor (geralmente set–dez).',
    quando: 'Quando prêmio na colheita está deprimido e existe expectativa de melhora sazonal.',
    risco: 'Custo de armazenagem (R$ 0,80–1,50/saca/mês), risco de queda do CBOT, capital parado.',
    exemplo: 'Colheita mai/2023 com prêmio 0,20. Estoca até nov/2023 quando prêmio sobe para 0,80. Ganho: 0,60 × 2,2 × 5 = R$ 6,60/saca. Custo: 6 meses × 1,20 = R$ 7,20.',
    melhor_para: 'JC/RS: produtor com armazém próprio (estrutura comum em cooperativas locais); sem armazém, custo costuma comer o ganho.',
  },
];

function PainelSoja() {
  const [cbot, setCbot] = useState(11.20);
  const [premio, setPremio] = useState(1.20);
  const [dolar, setDolar] = useState(5.40);
  const [freteCIF, setFreteCIF] = useState(11);
  const [custoSaca, setCustoSaca] = useState(95);
  const [custoFert, setCustoFert] = useState(3500);
  const [expCbot, setExpCbot] = useState('neutra');
  const [expPremio, setExpPremio] = useState('neutra');
  const [expDolar, setExpDolar] = useState('neutra');
  const [periodoIni, setPeriodoIni] = useState('10Q1');
  const [periodoFim, setPeriodoFim] = useState('26Q1');
  const [graficoVer, setGraficoVer] = useState('saca');
  const [gatilhoTrava, setGatilhoTrava] = useState(160);
  const [estratExp, setEstratExp] = useState(null);

  // Cálculos
  const sacaFOB = (cbot + premio) * BU_PER_SACA * dolar;
  const sacaCIF = sacaFOB - freteCIF; // preço líquido em Júlio de Castilhos
  const margemAbs = sacaCIF - custoSaca;
  const margemPct = (margemAbs / custoSaca) * 100;
  const trocaFert = custoFert / sacaCIF;

  const niveis = {
    cbot: classificar(cbot, FAIXAS.cbot),
    premio: classificar(premio, FAIXAS.premio),
    dolar: classificar(dolar, FAIXAS.dolar),
  };

  const estrategia = {
    cbot:   ESTRATEGIAS.cbot[`${niveis.cbot}_${expCbot}`],
    premio: ESTRATEGIAS.premio[`${niveis.premio}_${expPremio}`],
    dolar:  ESTRATEGIAS.dolar[`${niveis.dolar}_${expDolar}`],
  };

  const cenarios = useMemo(() => {
    const calc = (c, p, d) => (c + p) * BU_PER_SACA * d - freteCIF;
    return [
      { nome: 'Hoje',     valor: calc(cbot, premio, dolar) },
      { nome: 'CBOT +10%',valor: calc(cbot*1.1, premio, dolar) },
      { nome: 'CBOT -10%',valor: calc(cbot*0.9, premio, dolar) },
      { nome: 'Dólar +10%', valor: calc(cbot, premio, dolar*1.1) },
      { nome: 'Dólar -10%', valor: calc(cbot, premio, dolar*0.9) },
      { nome: 'Prêmio 0', valor: calc(cbot, 0, dolar) },
      { nome: 'Tudo +10%',valor: calc(cbot*1.1, premio*1.1, dolar*1.1) },
      { nome: 'Tudo -10%',valor: calc(cbot*0.9, premio*0.9, dolar*0.9) },
    ];
  }, [cbot, premio, dolar, freteCIF]);

  const projecao = useMemo(() => {
    const ajuste = (exp, mag) => exp === 'alta' ? mag : exp === 'baixa' ? -mag : 0;
    const meses = ['M0','M1','M2','M3','M4','M5','M6'];
    return meses.map((m, i) => {
      const t = i / 6;
      const c = cbot * (1 + ajuste(expCbot, 0.15) * t);
      const p = Math.max(0, premio * (1 + ajuste(expPremio, 0.30) * t));
      const d = dolar * (1 + ajuste(expDolar, 0.10) * t);
      return {
        mes: m,
        saca: Math.round(((c + p) * BU_PER_SACA * d - freteCIF) * 100) / 100,
        custo: custoSaca,
      };
    });
  }, [cbot, premio, dolar, custoSaca, expCbot, expPremio, expDolar, freteCIF]);

  const simulacao = useMemo(() => {
    const iIni = HISTORICO_CALC.findIndex(h => h.t === periodoIni);
    const iFim = HISTORICO_CALC.findIndex(h => h.t === periodoFim);
    if (iIni < 0 || iFim < 0 || iFim <= iIni) return null;
    const janela = HISTORICO_CALC.slice(iIni, iFim + 1);
    const precos = janela.map(j => j.sacaCIF);
    const tudoInicio = precos[0];
    const tudoFim = precos[precos.length - 1];
    const escalonado = precos.reduce((a, b) => a + b, 0) / precos.length;
    let pctTravado = 0, somaTravada = 0;
    precos.forEach(p => {
      if (p >= gatilhoTrava && pctTravado < 100) {
        somaTravada += p * 0.25;
        pctTravado += 25;
      }
    });
    const restante = 100 - pctTravado;
    const gatilho = pctTravado > 0 ? (somaTravada + (restante / 100) * tudoFim) : tudoFim;
    const topo = Math.max(...precos);
    const fundo = Math.min(...precos);
    return { janela, tudoInicio, tudoFim, escalonado, gatilho, topo, fundo };
  }, [periodoIni, periodoFim, gatilhoTrava]);

  const periodos = HISTORICO_CALC.map(h => h.t);

  const corNivel = (n) => n === 'alto' ? '#C8E04A' : n === 'baixo' ? '#D9542B' : '#A89968';
  const corEstrat = (c) => c === 'verde' ? '#C8E04A' : c === 'vermelho' ? '#D9542B' : '#E6B84A';

  return (
    <div style={S.app}>
      <header style={S.header}>
        <div>
          <div style={S.eyebrow}>Painel · Soja · Júlio de Castilhos / RS</div>
          <h1 className="h1" style={S.h1}>Margem da saca <span style={S.h1accent}>no campo</span></h1>
          <div style={S.subhead}>Preço líquido CIF JC · Porto Rio Grande · histórico 2010–2026 calibrado contra CEPEA Paranaguá</div>
        </div>
        <div style={S.precoBig}>
          <div style={S.precoLabel}>Saca 60kg (CIF JC)</div>
          <div className="preco-valor" style={S.precoValor}>R$ {sacaCIF.toFixed(2)}</div>
          <div style={{...S.precoMargem, color: margemAbs > 0 ? '#C8E04A' : '#D9542B'}}>
            {margemAbs > 0 ? '+' : ''}R$ {margemAbs.toFixed(2)} ({margemPct.toFixed(1)}%) vs custo
          </div>
          <div style={S.precoSub}>FOB Rio Grande: R$ {sacaFOB.toFixed(2)} · frete R$ {freteCIF}</div>
        </div>
      </header>

      <div className="grid" style={S.grid}>

        {/* 01 — COMPONENTES */}
        <section style={S.card}>
          <div style={S.cardLabel}>01 — Componentes do preço</div>
          {[
            { key: 'cbot', val: cbot, set: setCbot, exp: expCbot, setExp: setExpCbot, min: 7, max: 18, step: 0.05, fmt: v => v.toFixed(2), unit: 'USD/bu' },
            { key: 'premio', val: premio, set: setPremio, exp: expPremio, setExp: setExpPremio, min: -0.5, max: 3, step: 0.05, fmt: v => v.toFixed(2), unit: 'USD/bu' },
            { key: 'dolar', val: dolar, set: setDolar, exp: expDolar, setExp: setExpDolar, min: 4, max: 7, step: 0.01, fmt: v => 'R$ ' + v.toFixed(2), unit: 'BRL/USD' },
          ].map(c => (
            <div key={c.key} style={S.componenteRow}>
              <div style={S.componenteHead}>
                <span style={S.componenteLabel}>{FAIXAS[c.key].label}</span>
                <span style={{...S.componenteNivel, color: corNivel(niveis[c.key])}}>
                  ● {niveis[c.key].toUpperCase()}
                </span>
              </div>
              <div style={S.componenteValor}>{c.fmt(c.val)}</div>
              <input type="range" min={c.min} max={c.max} step={c.step} value={c.val}
                     onChange={e => c.set(parseFloat(e.target.value))} />
              <div style={S.expRow}>
                <span style={S.expLabel}>EXPECTATIVA</span>
                {['baixa', 'neutra', 'alta'].map(e => (
                  <button key={e} className={`exp ${c.exp === e ? 'ativo' : ''}`} onClick={() => c.setExp(e)}>
                    {e === 'baixa' ? '↓' : e === 'alta' ? '↑' : '→'} {e}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </section>

        {/* 02 — CUSTOS E TROCA */}
        <section style={S.card}>
          <div style={S.cardLabel}>02 — Custos, frete e relação de troca</div>
          <div style={S.inputBlock}>
            <label style={S.inputLabel}>Custo de produção (R$/saca)</label>
            <input type="number" value={custoSaca} step="1" onChange={e => setCustoSaca(parseFloat(e.target.value)||0)} />
          </div>
          <div style={S.inputBlock}>
            <label style={S.inputLabel}>Frete JC → Rio Grande (R$/saca)</label>
            <input type="number" value={freteCIF} step="0.5" onChange={e => setFreteCIF(parseFloat(e.target.value)||0)} />
          </div>
          <div style={S.inputBlock}>
            <label style={S.inputLabel}>Fertilizante NPK (R$/ton)</label>
            <input type="number" value={custoFert} step="50" onChange={e => setCustoFert(parseFloat(e.target.value)||0)} />
          </div>

          <div style={S.trocaBox}>
            <div style={S.trocaLabel}>Relação de troca</div>
            <div style={S.trocaValor}>{trocaFert.toFixed(1)} <span style={S.trocaUnit}>sacas / ton NPK</span></div>
            <div style={S.trocaNota}>
              {trocaFert < 20 ? 'Excelente — janela clara para barter' :
               trocaFert < 30 ? 'Razoável — média histórica' :
               trocaFert < 40 ? 'Apertado — atenção à margem' :
                                'Crítico — postergue compra de insumo'}
            </div>
          </div>

          <div style={S.margemBox}>
            {[
              ['Receita líquida (CIF JC)', `R$ ${sacaCIF.toFixed(2)}`],
              ['Custo / saca', `R$ ${custoSaca.toFixed(2)}`],
            ].map(([k, v]) => (
              <div key={k} style={S.margemRow}>
                <span style={S.margemKey}>{k}</span>
                <span style={S.margemVal}>{v}</span>
              </div>
            ))}
            <div style={{...S.margemRow, borderTop: '1px solid #2A2F28', paddingTop: 8, marginTop: 4}}>
              <span style={S.margemKey}>Margem</span>
              <span style={{...S.margemVal, color: margemAbs > 0 ? '#C8E04A' : '#D9542B', fontWeight: 700}}>
                R$ {margemAbs.toFixed(2)} · {margemPct.toFixed(1)}%
              </span>
            </div>
          </div>
        </section>

        {/* 03 — PROJEÇÃO */}
        <section className="span-2" style={{...S.card, gridColumn: 'span 2'}}>
          <div style={S.cardLabel}>03 — Projeção 6 meses (suas expectativas)</div>
          <div style={{height: 260, marginTop: 16}}>
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={projecao} margin={{ top: 10, right: 20, left: 0, bottom: 0 }}>
                <CartesianGrid strokeDasharray="2 4" stroke="#2A2F28" />
                <XAxis dataKey="mes" stroke="#6B7065" style={{fontSize: 11, fontFamily: 'IBM Plex Mono'}} />
                <YAxis stroke="#6B7065" style={{fontSize: 11, fontFamily: 'IBM Plex Mono'}} />
                <Tooltip contentStyle={{background: '#0F1410', border: '1px solid #2A2F28', fontFamily: 'IBM Plex Mono', fontSize: 12}} />
                <ReferenceLine y={custoSaca} stroke="#D9542B" strokeDasharray="3 3" label={{value: 'Custo', fill: '#D9542B', fontSize: 10}} />
                <Line type="monotone" dataKey="saca" stroke="#C8E04A" strokeWidth={2} dot={{fill: '#C8E04A', r: 4}} name="R$/saca CIF" />
              </LineChart>
            </ResponsiveContainer>
          </div>
        </section>

        {/* 04 — SENSIBILIDADE */}
        <section className="span-2" style={{...S.card, gridColumn: 'span 2'}}>
          <div style={S.cardLabel}>04 — Sensibilidade</div>
          <div style={{height: 240, marginTop: 16}}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={cenarios} margin={{ top: 10, right: 20, left: 0, bottom: 40 }}>
                <CartesianGrid strokeDasharray="2 4" stroke="#2A2F28" />
                <XAxis dataKey="nome" stroke="#6B7065" angle={-30} textAnchor="end" style={{fontSize: 10, fontFamily: 'IBM Plex Mono'}} />
                <YAxis stroke="#6B7065" style={{fontSize: 11, fontFamily: 'IBM Plex Mono'}} />
                <Tooltip contentStyle={{background: '#0F1410', border: '1px solid #2A2F28', fontFamily: 'IBM Plex Mono', fontSize: 12}} />
                <Bar dataKey="valor" name="R$/saca CIF">
                  {cenarios.map((c, i) => (
                    <Cell key={i} fill={c.valor > sacaCIF ? '#C8E04A' : c.valor < sacaCIF ? '#D9542B' : '#A89968'} />
                  ))}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </section>

        {/* 05 — ESTRATÉGIA */}
        <section className="span-2" style={{...S.card, gridColumn: 'span 2', borderColor: '#C8E04A'}}>
          <div style={{...S.cardLabel, color: '#C8E04A'}}>05 — Estratégia recomendada para a janela atual</div>
          {[
            { key: 'cbot', label: 'CBOT' },
            { key: 'premio', label: 'PRÊMIO' },
            { key: 'dolar', label: 'DÓLAR' },
          ].map(c => {
            const e = estrategia[c.key];
            return (
              <div key={c.key} style={S.estratRow}>
                <div style={S.estratHead}>
                  <span style={S.estratComp}>{c.label}</span>
                  <span style={{...S.estratAcao, color: corEstrat(e.cor)}}>{e.acao}</span>
                  {e.pct > 0 && <span style={S.estratPct}>{e.pct}%</span>}
                </div>
                <div style={S.estratNota}>{e.nota}</div>
              </div>
            );
          })}
          <div style={S.sintese}>
            <div style={S.sinteseLabel}>SÍNTESE</div>
            <div style={S.sinteseTexto}>
              {(() => {
                const acoes = Object.values(estrategia);
                const travarTotal = acoes.filter(a => a.pct >= 50).length;
                const naoTravar = acoes.filter(a => a.pct === 0).length;
                if (travarTotal >= 2) return 'Janela favorável aberta. Trave em camadas os componentes em patamar alto; não tente acertar o topo.';
                if (naoTravar >= 2) return 'Janela ruim. Aguarde; considere calls para upside; só trave por necessidade de caixa ou margem.';
                return 'Mercado misto. Trave o que está bom, mantenha aberto o que está ruim; escalone toda decisão.';
              })()}
            </div>
          </div>
        </section>

        {/* 06 — HISTÓRICO */}
        <section className="span-2" style={{...S.card, gridColumn: 'span 2'}}>
          <div style={S.cardLabel}>06 — Histórico (2020–2025, base Rio Grande)</div>
          <div style={S.tabRow}>
            {[
              { k: 'saca', l: 'Preço CIF JC' },
              { k: 'componentes', l: 'Componentes' },
              { k: 'troca', l: 'Troca / fert.' },
            ].map(t => (
              <button key={t.k} className={`exp ${graficoVer === t.k ? 'ativo' : ''}`} onClick={() => setGraficoVer(t.k)}>
                {t.l}
              </button>
            ))}
          </div>
          <div style={{height: 280, marginTop: 16}}>
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={HISTORICO_CALC} margin={{ top: 10, right: 20, left: 0, bottom: 30 }}>
                <CartesianGrid strokeDasharray="2 4" stroke="#2A2F28" />
                <XAxis dataKey="t" stroke="#6B7065" angle={-45} textAnchor="end" style={{fontSize: 10, fontFamily: 'IBM Plex Mono'}} />
                <YAxis stroke="#6B7065" style={{fontSize: 11, fontFamily: 'IBM Plex Mono'}} />
                <Tooltip
                  contentStyle={{background: '#0F1410', border: '1px solid #2A2F28', fontFamily: 'IBM Plex Mono', fontSize: 12}}
                  labelFormatter={(t) => {
                    const it = HISTORICO_CALC.find(h => h.t === t);
                    return `${t} · ${it ? it.evento : ''}`;
                  }} />
                {graficoVer === 'saca' && <Line type="monotone" dataKey="sacaCIF" stroke="#C8E04A" strokeWidth={2}
                  dot={(props) => {
                    const { cx, cy, payload } = props;
                    if (payload && payload.conf) {
                      return <circle cx={cx} cy={cy} r={5} fill="#C8E04A" stroke="#0F1410" strokeWidth={2} />;
                    }
                    return <circle cx={cx} cy={cy} r={2.5} fill="#6B7065" />;
                  }} name="R$/saca CIF" />}
                {graficoVer === 'componentes' && [
                  <Line key="c" type="monotone" dataKey="cbot" stroke="#C8E04A" strokeWidth={2} dot={{r: 3}} name="CBOT (USD/bu)" />,
                  <Line key="p" type="monotone" dataKey="premio" stroke="#E6B84A" strokeWidth={2} dot={{r: 3}} name="Prêmio RG (USD/bu)" />,
                  <Line key="d" type="monotone" dataKey="dolar" stroke="#D9542B" strokeWidth={2} dot={{r: 3}} name="Dólar (R$)" />
                ]}
                {graficoVer === 'troca' && <Line type="monotone" dataKey="trocaFert" stroke="#D9542B" strokeWidth={2} dot={{r: 3}} name="sacas/ton NPK" />}
              </LineChart>
            </ResponsiveContainer>
          </div>
          <div style={S.legendaHist}>
            {graficoVer === 'saca' && '★ Pontos maiores e brilhantes = trimestres com âncora CEPEA Paranaguá CONFIRMADA (19 de 65). Pontos cinza menores = trimestres com prêmio interpolado. Pico absoluto: 22Q2 (Ucrânia, R$ 196). Vale histórico: 10Q2 (R$ 28). 12Q3 pico EUA: R$ 74 nominal (= R$ 153 deflacionado a hoje).'}
            {graficoVer === 'componentes' && 'CBOT teve dois super-picos: 12Q3 (17,6 USD/bu, seca EUA) e 22Q2 (19 USD/bu, guerra). Dólar saltou em 15-16 (crise BR), 20Q2 (COVID) e 24Q4 (fiscal). Prêmio Paranaguá foi negativo em 2018 (calibrado contra anchor CEPEA set/18 = R$ 95,60) e positivo em 2010-2012 (BR price-taker).'}
            {graficoVer === 'troca' && 'Sacas para comprar 1 ton de ureia (Black Sea convertido em R$). PIORES períodos históricos: 21Q4 (35 sacas) e 22Q1 (29 sacas) — ureia disparou de 245 para 821 USD/ton. MELHORES janelas para barter: 16Q2, 17Q2 e 20Q2 (~17 sacas).'}
          </div>
        </section>

        {/* 07 — SIMULADOR */}
        <section className="span-2" style={{...S.card, gridColumn: 'span 2', borderColor: '#E6B84A'}}>
          <div style={{...S.cardLabel, color: '#E6B84A'}}>07 — Simulador de venda escalonada</div>
          <div className="sim-controls" style={S.simControls}>
            <div style={S.inputBlock}>
              <label style={S.inputLabel}>Início da janela</label>
              <select value={periodoIni} onChange={e => setPeriodoIni(e.target.value)}>
                {periodos.slice(0, -1).map(p => <option key={p} value={p}>{p}</option>)}
              </select>
            </div>
            <div style={S.inputBlock}>
              <label style={S.inputLabel}>Fim da janela</label>
              <select value={periodoFim} onChange={e => setPeriodoFim(e.target.value)}>
                {periodos.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
            </div>
            <div style={S.inputBlock}>
              <label style={S.inputLabel}>Gatilho de trava (R$/saca)</label>
              <input type="number" value={gatilhoTrava} step="5" onChange={e => setGatilhoTrava(parseFloat(e.target.value)||0)} />
            </div>
          </div>

          {simulacao && (
            <>
              <div style={{height: 220, marginTop: 16}}>
                <ResponsiveContainer width="100%" height="100%">
                  <LineChart data={simulacao.janela} margin={{ top: 10, right: 20, left: 0, bottom: 20 }}>
                    <CartesianGrid strokeDasharray="2 4" stroke="#2A2F28" />
                    <XAxis dataKey="t" stroke="#6B7065" style={{fontSize: 11, fontFamily: 'IBM Plex Mono'}} />
                    <YAxis stroke="#6B7065" style={{fontSize: 11, fontFamily: 'IBM Plex Mono'}} />
                    <Tooltip contentStyle={{background: '#0F1410', border: '1px solid #2A2F28', fontFamily: 'IBM Plex Mono', fontSize: 12}} />
                    <ReferenceLine y={gatilhoTrava} stroke="#E6B84A" strokeDasharray="3 3" label={{value: 'Gatilho', fill: '#E6B84A', fontSize: 10, position: 'right'}} />
                    <ReferenceLine y={simulacao.escalonado} stroke="#C8E04A" strokeDasharray="3 3" label={{value: 'Média esc.', fill: '#C8E04A', fontSize: 10, position: 'right'}} />
                    <Line type="monotone" dataKey="sacaCIF" stroke="#E8E2D0" strokeWidth={2} dot={{r: 4}} name="R$/saca CIF" />
                  </LineChart>
                </ResponsiveContainer>
              </div>

              <div className="sim-grid" style={S.simGrid}>
                {[
                  { l: 'Pior da janela', v: simulacao.fundo, cor: '#D9542B' },
                  { l: 'Travou no início', v: simulacao.tudoInicio, cor: '#A89968' },
                  { l: 'Travou no fim', v: simulacao.tudoFim, cor: '#A89968' },
                  { l: 'Escalonado linear', v: simulacao.escalonado, cor: '#C8E04A' },
                  { l: `Gatilho R$${gatilhoTrava}`, v: simulacao.gatilho, cor: '#C8E04A' },
                  { l: 'Topo perfeito', v: simulacao.topo, cor: '#C8E04A' },
                ].map((s, i) => (
                  <div key={i} style={S.simCell}>
                    <div style={S.simCellLabel}>{s.l}</div>
                    <div style={{...S.simCellValor, color: s.cor}}>R$ {s.v.toFixed(2)}</div>
                    <div style={S.simCellDelta}>
                      {s.v > custoSaca ? `+${((s.v - custoSaca)/custoSaca*100).toFixed(0)}% margem` : `${((s.v - custoSaca)/custoSaca*100).toFixed(0)}% (prejuízo)`}
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}
        </section>

        {/* 08 — ESTRATÉGIAS CLÁSSICAS */}
        <section className="span-2" style={{...S.card, gridColumn: 'span 2'}}>
          <div style={S.cardLabel}>08 — Estratégias clássicas de comercialização</div>
          <div style={S.estratClassicaWrap}>
            {ESTRATEGIAS_CLASSICAS.map((est, i) => (
              <div key={i} style={S.estratClassicaCard}>
                <button className="estrat-toggle" onClick={() => setEstratExp(estratExp === i ? null : i)}>
                  <span style={{color: '#6B7065'}}>{String(i+1).padStart(2,'0')}</span> · <span style={{color: '#E8E2D0', fontWeight: 600}}>{est.nome}</span>
                  <span style={{float: 'right', color: '#C8E04A'}}>{estratExp === i ? '−' : '+'}</span>
                </button>
                {estratExp === i && (
                  <div style={S.estratClassicaBody}>
                    <div style={S.estratClassicaSinon}>{est.sinonimos}</div>
                    <div style={S.estratClassicaSec}>
                      <div style={S.estratClassicaSecLabel}>COMO FUNCIONA</div>
                      <div style={S.estratClassicaSecText}>{est.descricao}</div>
                    </div>
                    <div style={S.estratClassicaSec}>
                      <div style={S.estratClassicaSecLabel}>QUANDO USAR</div>
                      <div style={S.estratClassicaSecText}>{est.quando}</div>
                    </div>
                    <div style={S.estratClassicaSec}>
                      <div style={S.estratClassicaSecLabel}>RISCO</div>
                      <div style={S.estratClassicaSecText}>{est.risco}</div>
                    </div>
                    <div style={S.estratClassicaSec}>
                      <div style={S.estratClassicaSecLabel}>EXEMPLO</div>
                      <div style={S.estratClassicaSecText}>{est.exemplo}</div>
                    </div>
                    <div style={{...S.estratClassicaSec, borderLeft: '2px solid #C8E04A', paddingLeft: 12}}>
                      <div style={{...S.estratClassicaSecLabel, color: '#C8E04A'}}>JÚLIO DE CASTILHOS / RS</div>
                      <div style={S.estratClassicaSecText}>{est.melhor_para}</div>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </section>

        {/* 09 — EVENTOS */}
        <section className="span-2" style={{...S.card, gridColumn: 'span 2'}}>
          <div style={S.cardLabel}>09 — Eventos-chave para calibrar leitura</div>
          <div className="eventos-grid" style={S.eventosGrid}>
            {[
              { p: '12Q3', e: 'Seca histórica EUA', li: 'CBOT bateu 17,6 USD/bu — recorde até então. Quem travou em ago/set garantiu o maior preço da década. Quem segurou para "ir a 20" perdeu 30% nos meses seguintes.' },
              { p: '13Q1', e: 'Safra recorde BR', li: 'Prêmio Rio Grande caiu rapidamente com chegada da safra brasileira. Lição: trave prêmio em jan/fev antes da entrada do volume.' },
              { p: '15-16', e: 'Crise política BR', li: 'Dólar foi de 2,86 para 3,91 em 12 meses. Quem não travou dólar capturou ganho enorme em reais mesmo com CBOT no fundo (9-10 USD/bu).' },
              { p: '18Q3', e: 'Guerra comercial', li: 'China cortou compras dos EUA e foi 100% para o Brasil. Prêmio Paranaguá/Rio Grande explodiu para >2 USD/bu. Quem travou prêmio agressivo no Q3 ganhou muito.' },
              { p: '20Q2', e: 'COVID', li: 'Dólar disparou de 4,46 para 5,39 em um trimestre, antes do CBOT reagir. Quem deixou câmbio aberto em mar/abr ganhou; quem travou cedo perdeu o pico.' },
              { p: '21Q2', e: 'Pico CBOT 2021', li: 'CBOT a 16 USD/bu parecia esticado. Era — corrigiu 12% no Q3. Travar agressivo aqui foi a decisão correta.' },
              { p: '21Q4', e: 'Ureia HISTÓRICA', li: 'Ureia foi de 245 para 828 USD/ton (+238%) em 12 meses. Quem fez barter em set/2020 evitou catástrofe; quem comprou em out/21 pagou caríssimo.' },
              { p: '22Q1-Q2', e: 'Guerra Ucrânia', li: 'Os três componentes subiram juntos — JANELA RARA. CBOT a 19 USD/bu, prêmio acima de 2, dólar firme. Travar 70%+ era o óbvio para quem tinha produção.' },
              { p: '22/23', e: 'Estiagem RS', li: 'JC e região perderam até 50% da safra. Quem pré-vendeu mais de 50% precisou recomprar no mercado quando preço estava em pico — prejuízo severo.' },
              { p: '23Q2', e: 'Prêmio DERRETE', li: 'Safra recorde BR derrubou basis Rio Grande de 0,90 para 0,30 USD/bu em um trimestre. Quem travou prêmio em 22Q4 ganhou muito.' },
              { p: '24Q4', e: 'Dólar DISPARA', li: 'Real foi de 5,51 para 5,95 em 3 meses (crise fiscal). Quem não travou dólar capturou ganho generoso mesmo com CBOT em 10,86 USD/bu.' },
              { p: '25Q1', e: 'Real recupera', li: 'Selic 14,75% + fluxo trouxe dólar para 5,85. Quem travou câmbio em dez/24 a 5,95+ acertou em cheio.' },
            ].map((ev, i) => (
              <div key={i} style={S.eventoCard}>
                <div style={S.eventoHead}>
                  <span style={S.eventoP}>{ev.p}</span>
                  <span style={S.eventoE}>{ev.e}</span>
                </div>
                <div style={S.eventoLi}>{ev.li}</div>
              </div>
            ))}
          </div>
        </section>

      </div>

      <footer style={S.footer}>
        <div style={{fontWeight: 600, color: '#A89968', marginBottom: 6}}>FONTES E METODOLOGIA</div>
        <div>· <strong>CBOT (USD/bu):</strong> Soja Rotterdam CIF (Banco Mundial / Oil World / USDA, via IndexMundi). Conversão: (USD/ton − 30) ÷ 36,7437. Série mensal 2010–2026.</div>
        <div>· <strong>USD/BRL:</strong> Médias mensais PTAX / Banco Central do Brasil.</div>
        <div>· <strong>Prêmio Paranaguá:</strong> Calibrado contra <strong>19 pontos CEPEA Paranaguá confirmados</strong> em fontes públicas (releases CEPEA-Esalq/USP, Farmnews, Canal Rural, BiodieselBR). Trimestres intermediários: interpolação linear. Marcador ★ no chart "Preço CIF JC" indica trimestres com âncora confirmada.</div>
        <div>· <strong>Ureia (R$/ton):</strong> Preço Black Sea FOB (Banco Mundial via IndexMundi) × USD/BRL × 1,3 (markup posto-Brasil para logística + ICMS).</div>
        <div>· <strong>Frete JC → Rio Grande:</strong> R$ 4 (2010-12) a R$ 13 (2022, diesel) por saca; estimado conforme combustível/sazonalidade.</div>
        <div>· <strong>Spread Paranaguá → JC (CIF):</strong> Frete rodoviário JC→Rio Grande + diferencial RG-Pgua (≈ R$ 0 a R$ 8/saca conforme época, embutido no frete).</div>
        <div style={{marginTop: 8, fontStyle: 'italic'}}>Para série diária completa: CEPEA-Esalq/USP (cepea.org.br/br/indicador/soja). SEAB-PR publica preços ao produtor desde 1995 (agricultura.pr.gov.br/deral/precos).</div>
        <div style={{marginTop: 6}}>Faixas calibradas atuais: CBOT {FAIXAS.cbot.baixo}–{FAIXAS.cbot.alto}, prêmio {FAIXAS.premio.baixo}–{FAIXAS.premio.alto}, dólar {FAIXAS.dolar.baixo}–{FAIXAS.dolar.alto}.</div>
      </footer>
    </div>
  );
}
